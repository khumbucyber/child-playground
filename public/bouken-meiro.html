<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ぼうけん めいろ！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: linear-gradient(150deg, #c8f0b8 0%, #c0dcff 45%, #ffd4ec 100%);
  height: 100dvh;
  max-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', 'Kosugi Maru', sans-serif;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

/* ─ Header ─ */
.header {
  flex-shrink: 0;
  width: 100%;
  padding: 6px 12px 2px;
  text-align: center;
  position: relative;
}

.back-btn {
  position: absolute;
  top: 6px;
  left: 12px;
  text-decoration: none;
  font-size: 13px;
  font-weight: 900;
  color: #7a5a9a;
  background: rgba(255,255,255,0.7);
  border-radius: 999px;
  padding: 5px 11px;
  touch-action: manipulation;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  box-shadow: 0 2px 6px rgba(80,40,140,0.15);
}

.title {
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 2px;
  color: white;
  text-shadow: 0 2px 0 #c060a0, 0 4px 10px rgba(192,96,160,0.4);
}

.sub {
  font-size: 10px;
  color: #5a3a7a;
  margin-top: 1px;
  font-weight: bold;
}

.friends-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 4px;
}

.fbadge {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}

.femoji {
  font-size: 24px;
  display: inline-block;
  filter: grayscale(0.5) opacity(0.75);
  transition: filter 0.5s cubic-bezier(.34,1.56,.64,1), transform 0.5s cubic-bezier(.34,1.56,.64,1);
}
.femoji.rescued {
  filter: none;
  animation: popIn 0.55s cubic-bezier(.34,1.56,.64,1);
}

.flabel {
  font-size: 10px;
  color: #7a5a9a;
  font-weight: bold;
}
.flabel.rescued { color: #e060b0; }

@keyframes popIn {
  0%   { transform: scale(0) rotate(-25deg); }
  100% { transform: scale(1) rotate(0deg); }
}

/* ─ Maze ─ */
.maze-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  padding: 4px 8px;
}

#mazeCanvas {
  display: block;
  border-radius: 18px;
  box-shadow: 0 10px 40px rgba(80,40,140,0.22), 0 0 0 3px rgba(255,255,255,0.7);
}

/* ─ D-Pad ─ */
.dpad {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: repeat(3, 44px);
  grid-template-rows: repeat(3, 44px);
  gap: 3px;
  padding-bottom: 0;
  padding-top: 4px;
}

.cbtn {
  width: 44px; height: 44px;
  border-radius: 14px;
  border: none;
  font-size: 22px;
  background: white;
  box-shadow: 0 4px 0 rgba(80,50,140,0.22);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.1s, box-shadow 0.1s;
  touch-action: manipulation;
  color: #5a3a9a;
  font-weight: 900;
}
.cbtn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(80,50,140,0.2); }
.cbtn.empty { background: transparent; box-shadow: none; pointer-events: none; }
.cbtn.hammer-btn { background: #fff8e0; color: #c07000; font-size: 20px; }
.cbtn.hammer-btn.hammer-on {
  background: linear-gradient(135deg, #ffe066, #ffb300);
  color: white;
  box-shadow: 0 4px 0 rgba(180,100,0,0.35), 0 0 12px rgba(255,180,0,0.7);
  animation: hammerPulse 0.6s ease-in-out infinite;
}
@keyframes hammerPulse {
  0%,100% { box-shadow: 0 4px 0 rgba(180,100,0,0.35), 0 0 12px rgba(255,180,0,0.7); }
  50%      { box-shadow: 0 4px 0 rgba(180,100,0,0.35), 0 0 22px rgba(255,180,0,1.0); }
}

/* ─ Overlay（キャラ選択・ポップアップ共通） ─ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(60,30,100,0.6);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.overlay.show { opacity:1; pointer-events:all; }

.pcard {
  background: white;
  border-radius: 28px;
  padding: 28px 28px 22px;
  text-align: center;
  max-width: 300px;
  width: 86vw;
  box-shadow: 0 24px 60px rgba(80,40,140,0.4);
  transform: scale(0.7) translateY(40px);
  transition: transform 0.45s cubic-bezier(.34,1.56,.64,1);
}
.overlay.show .pcard { transform: scale(1) translateY(0); }

.pemoji { font-size: 68px; display: block; margin-bottom: 8px; line-height: 1; }
.ptitle { font-size: 20px; font-weight: 900; color: #5a30a0; margin-bottom: 10px; }
.ptext  { font-size: 14px; color: #666; line-height: 1.8; margin-bottom: 20px; white-space: pre-line; }

.pbtn {
  background: linear-gradient(135deg, #f06090, #ff9f43);
  color: white;
  border: none;
  border-radius: 999px;
  padding: 13px 28px;
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(240,96,144,0.5);
  width: 100%;
  letter-spacing: 1px;
  touch-action: manipulation;
}
.pbtn.restart {
  background: linear-gradient(135deg, #43c664, #4d96ff);
  box-shadow: 0 6px 18px rgba(67,198,100,0.45);
  margin-top: 10px;
}

/* ─ キャラ選択ボタン ─ */
.chara-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 4px;
  flex-wrap: wrap;
}
.chara-btn {
  flex: 1;
  min-width: 72px;
  max-width: 100px;
  border: 3px solid transparent;
  border-radius: 20px;
  background: #f5f0ff;
  padding: 10px 6px;
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.15s, border-color 0.15s;
  font-size: 13px;
  font-weight: 900;
  color: #5a30a0;
}
.chara-btn:active { transform: scale(0.94); }
.chara-btn .chara-icon { font-size: 40px; display: block; margin-bottom: 4px; }
.chara-btn .chara-name { font-size: 13px; }
.chara-btn .chara-sub  { font-size: 10px; color: #9a7aba; margin-top: 2px; }

/* ─ Confetti ─ */
#cfCanvas {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 50;
  width: 100%; height: 100%;
}
</style>
</head>
<body>

<div class="header">
  <a href="./index.html" class="back-btn">&#8592; もどる</a>
  <div class="title">🌟 ぼうけん めいろ 🌟</div>
  <div class="sub" id="headerSub">ゴールまで つれていこう！</div>
  <div class="friends-bar">
    <div class="fbadge"><span class="femoji" id="f0">🐰</span><span class="flabel" id="fl0">ウサギ</span></div>
    <div class="fbadge"><span class="femoji" id="f1">🐤</span><span class="flabel" id="fl1">ピヨちゃん</span></div>
    <div class="fbadge"><span class="femoji" id="f2">🐻</span><span class="flabel" id="fl2">クマくん</span></div>
  </div>
</div>

<div class="maze-wrap">
  <canvas id="mazeCanvas"></canvas>
</div>

<div class="dpad">
  <div class="cbtn empty"></div>
  <button class="cbtn" id="bU">▲</button>
  <div class="cbtn empty"></div>
  <button class="cbtn" id="bL">◀</button>
  <button class="cbtn hammer-btn" id="bHammer">🔨</button>
  <button class="cbtn" id="bR">▶</button>
  <div class="cbtn empty"></div>
  <button class="cbtn" id="bD">▼</button>
  <div class="cbtn empty"></div>
</div>

<!-- キャラ選択オーバーレイ -->
<div class="overlay show" id="charaOverlay">
  <div class="pcard">
    <div class="ptitle">🎮 キャラを えらんでね！</div>
    <div class="chara-row">
      <button class="chara-btn" onclick="selectChara('wa')">
        <span class="chara-icon">👧🏻</span>
        <span class="chara-name">わーちゃん</span>
        <span class="chara-sub">くろかみの おんなのこ</span>
      </button>
      <button class="chara-btn" onclick="selectChara('tomo')">
        <span class="chara-icon">👦</span>
        <span class="chara-name">ともくん</span>
        <span class="chara-sub">くろかみの おとこのこ</span>
      </button>
      <button class="chara-btn" onclick="selectChara('tacchun')">
        <span class="chara-icon">👦🏽</span>
        <span class="chara-name">たっちゅん</span>
        <span class="chara-sub">ちゃいろいかみの ちびっこ</span>
      </button>
      <button class="chara-btn" onclick="selectChara('omochi')">
        <span class="chara-icon">🐕</span>
        <span class="chara-name">おもち</span>
        <span class="chara-sub">しろいイヌ</span>
      </button>
      <button class="chara-btn" onclick="selectChara('oto')">
        <span class="chara-icon">👧</span>
        <span class="chara-name">おとちゃん</span>
        <span class="chara-sub">くろかみの おんなのこ</span>
      </button>
    </div>
  </div>
</div>

<!-- ポップアップオーバーレイ -->
<div class="overlay" id="overlay">
  <div class="pcard">
    <span class="pemoji" id="pEmoji"></span>
    <div class="ptitle" id="pTitle"></div>
    <div class="ptext"  id="pText"></div>
    <button class="pbtn" id="pBtn"></button>
  </div>
</div>

<canvas id="cfCanvas"></canvas>

<script>
'use strict';

// ══════════════════════════════════════
//  キャラクター定義
// ══════════════════════════════════════

// キャンバスにキャラを描く共通ヘルパー
function makeDrawPlayer(emoji, glowRgb, shadowRgb, bgColor) {
  return function(gfx, px, py, cs, t0) {
    const glow = 0.7 + 0.3 * Math.sin((Date.now()-t0)/300);
    gfx.fillStyle = `rgba(${glowRgb},${0.28*glow})`;
    gfx.beginPath(); gfx.arc(px, py, cs*0.52, 0, Math.PI*2); gfx.fill();
    gfx.fillStyle = bgColor;
    gfx.shadowColor = `rgba(${shadowRgb},0.8)`;
    gfx.shadowBlur = cs*0.4;
    gfx.beginPath(); gfx.arc(px, py, cs*0.42, 0, Math.PI*2); gfx.fill();
    gfx.shadowBlur = 0;
    gfx.font = `${cs*0.72}px serif`;
    gfx.fillText(emoji, px, py);
  };
}

const CHARAS = {
  omochi: {
    emoji: '🐕',
    name: 'おもち',
    drawPlayer: makeDrawPlayer('🐕', '255,200,60', '200,180,255', '#ffffff')
  },
  oto: {
    emoji: '👧',
    name: 'おとちゃん',
    drawPlayer: makeDrawPlayer('👧', '255,160,220', '255,100,180', '#fff0f8')
  },
  wa: {
    emoji: '👧🏻',
    name: 'わーちゃん',
    drawPlayer: makeDrawPlayer('👧🏻', '160,210,255', '80,160,255', '#f0f8ff')
  },
  tomo: {
    emoji: '👦',
    name: 'ともくん',
    drawPlayer: makeDrawPlayer('👦', '160,230,180', '60,160,100', '#f0fff4')
  },
  tacchun: {
    emoji: '👦🏽',
    name: 'たっちゅん',
    drawPlayer: makeDrawPlayer('👦🏽', '255,200,130', '200,130,60', '#fffaf0')
  }
};

let selectedChara = null;

function selectChara(key) {
  selectedChara = CHARAS[key];
  currentLeader = { emoji: selectedChara.emoji, drawPlayer: selectedChara.drawPlayer };
  document.getElementById('charaOverlay').classList.remove('show');
  document.getElementById('headerSub').textContent =
    `${selectedChara.emoji} ${selectedChara.name}を ゴールまで つれていこう！`;
  init();
  updateHammerBtn();
  startAnim();
}

// ══════════════════════════════════════
//  Config
// ══════════════════════════════════════
const COLS = 9, ROWS = 10;
const N=0, E=1, S=2, W=3;
const DIRS = [
  {dx:0,dy:-1,w:N,op:S},
  {dx:1,dy:0, w:E,op:W},
  {dx:0,dy:1, w:S,op:N},
  {dx:-1,dy:0,w:W,op:E}
];

const FOLLOW_DELAY = 3;

// うんちの数
const POOP_COUNT = 3;

function makeEvents() {
  return [
    {
      emoji:'🐰', done:false,
      title:'🐰 ウサギを たすけた！',
      text:'「クモの す に ひっかかって\nうごけなかったよ〜！\nありがとう！\nいっしょに いくね！」',
      btn:'すすむ！ ➡️', goal:false
    },{
      emoji:'🐤', done:false,
      title:'🐤 ピヨちゃんを たすけた！',
      text:'「ママを さがしてたら\nまいごに なっちゃった！\nよかった〜！\nいっしょに かえろ！」',
      btn:'すすむ！ ➡️', goal:false
    },{
      emoji:'🐻', done:false,
      title:'🐻 クマくんを たすけた！',
      text:'「はなに ハチが とまって\nこわくて うごけなかった！\nたすかったよ〜！\nありがとう！！」',
      btn:'すすむ！ ➡️', goal:false
    },{
      emoji:'🏠', done:false,
      title:'🎉 ゴール！ やったー！！',
      text:'みんな たすかった！\nほんとうに ありがとう！\nみんなで パーティーしよう！🎊🎈',
      btn:null, goal:true
    }
  ];
}

let EVENTS = makeEvents();

// ══════════════════════════════════════
//  Maze generation
// ══════════════════════════════════════
function shuffle(a) {
  for (let i=a.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function genMaze(cols, rows) {
  const g = Array.from({length:rows}, ()=>
    Array.from({length:cols}, ()=>({w:[1,1,1,1], v:0}))
  );
  function dfs(x,y) {
    g[y][x].v=1;
    for (const {dx,dy,w,op} of shuffle([...DIRS])) {
      const nx=x+dx, ny=y+dy;
      if (nx>=0&&nx<cols&&ny>=0&&ny<rows&&!g[ny][nx].v) {
        g[y][x].w[w]=0;
        g[ny][nx].w[op]=0;
        dfs(nx,ny);
      }
    }
  }
  dfs(0,0);
  return g;
}

function bfsSolve(g, cols, rows, sx, sy, ex, ey) {
  const q=[{x:sx,y:sy,p:[{x:sx,y:sy}]}];
  const seen=new Set([`${sx},${sy}`]);
  while (q.length) {
    const {x,y,p}=q.shift();
    if (x===ex&&y===ey) return p;
    for (const {dx,dy,w} of DIRS) {
      const nx=x+dx,ny=y+dy,k=`${nx},${ny}`;
      if (nx>=0&&nx<cols&&ny>=0&&ny<rows&&!g[y][x].w[w]&&!seen.has(k)) {
        seen.add(k); q.push({x:nx,y:ny,p:[...p,{x:nx,y:ny}]});
      }
    }
  }
  return [];
}

// ══════════════════════════════════════
//  State
// ══════════════════════════════════════
let grid, path, pathSet, cps, player, cs;
let pQueue=[], pActive=false;
let moveHistory = [];
let rescuedFriends = [];   // ゴール前の仲間（後ろに続く）
let goaledCount = 0;       // ゴールに入った人数（先頭キャラ含む）
let totalMembers = 1;      // 先頭 + 助けた仲間の合計
let currentLeader = null;  // 現在操作中のキャラ描画情報 {emoji, drawFn}
let hammerPos = null;
let hasHammer = false;
let hammerMode = false;  // ONのとき次の壁衝突で破壊
let poops = [];
let goalDone = false;

const canvas = document.getElementById('mazeCanvas');
const gfx    = canvas.getContext('2d');

// ══════════════════════════════════════
//  Init
// ══════════════════════════════════════
function init() {
  const maxW = Math.min(window.innerWidth, 430) - 20;
  const dpadH = 3*44 + 2*3 + 4 + 14;
  const headerH = document.querySelector('.header').offsetHeight + 8;
  const maxH = window.innerHeight - dpadH - headerH;
  cs = Math.min(Math.floor(maxW/COLS), Math.floor(maxH/ROWS), 42);

  canvas.width  = COLS*cs;
  canvas.height = ROWS*cs;

  grid = genMaze(COLS, ROWS);
  path = bfsSolve(grid, COLS, ROWS, 0, 0, COLS-1, ROWS-1);
  pathSet = new Set(path.map(p=>`${p.x},${p.y}`));

  const L = path.length;
  cps = [
    {...path[Math.floor(L*0.28)], fi:0},
    {...path[Math.floor(L*0.55)], fi:1},
    {...path[Math.floor(L*0.78)], fi:2},
  ];

  // ── ハンマー＆必須壁 ──
  const wallIdx = Math.floor(L * 0.72);
  const wFrom = path[wallIdx];
  const wTo   = path[wallIdx + 1];
  const wDir  = dirBetween(wFrom, wTo);
  const wOp   = oppDir(wDir);
  grid[wFrom.y][wFrom.x].w[wDir] = 1;
  grid[wTo.y][wTo.x].w[wOp]      = 1;

  const hammerIdx = Math.floor(L * 0.38);
  hammerPos = { x: path[hammerIdx].x, y: path[hammerIdx].y };
  for (const cp of cps) {
    if (hammerPos.x === cp.x && hammerPos.y === cp.y) {
      hammerPos = { x: path[hammerIdx + 1].x, y: path[hammerIdx + 1].y };
      break;
    }
  }
  hasHammer = false;
  hammerMode = false;

  // ── うんち配置（解答経路外のセルからランダムに選ぶ） ──
  const offPath = [];
  for (let y=0;y<ROWS;y++) for (let x=0;x<COLS;x++) {
    const k = `${x},${y}`;
    if (!pathSet.has(k) && !(x===0&&y===0) && !(x===COLS-1&&y===ROWS-1)) {
      offPath.push({x,y});
    }
  }
  shuffle(offPath);
  poops = offPath.slice(0, Math.min(POOP_COUNT, offPath.length));

  EVENTS = makeEvents();
  player = {x:0, y:0};
  moveHistory = [{x:0, y:0}];
  rescuedFriends = [];
  goaledCount = 0;
  totalMembers = 1;
  currentLeader = { emoji: selectedChara.emoji, drawPlayer: selectedChara.drawPlayer };
  goalDone = false;
  pQueue=[]; pActive=false;

  [0,1,2].forEach(i=>{
    document.getElementById(`f${i}`).className='femoji';
    document.getElementById(`fl${i}`).className='flabel';
  });

  draw();
}

function dirBetween(from, to) {
  if (to.x === from.x + 1) return E;
  if (to.x === from.x - 1) return W;
  if (to.y === from.y + 1) return S;
  return N;
}
function oppDir(d) { return [S,W,N,E][d]; }

// ══════════════════════════════════════
//  Drawing helpers
// ══════════════════════════════════════
function drawSpiderweb(gfx, cx, cy, r) {
  const rings = 3;
  const spokes = 8;
  gfx.save();
  gfx.strokeStyle = 'rgba(180,160,220,0.72)';
  gfx.lineWidth = 0.8;
  // 放射状の糸
  for (let s = 0; s < spokes; s++) {
    const angle = (s / spokes) * Math.PI * 2;
    gfx.beginPath();
    gfx.moveTo(cx, cy);
    gfx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
    gfx.stroke();
  }
  // 同心円の糸
  for (let ri = 1; ri <= rings; ri++) {
    const rr = r * (ri / rings);
    gfx.beginPath();
    for (let s = 0; s <= spokes; s++) {
      const angle = (s / spokes) * Math.PI * 2;
      const x = cx + Math.cos(angle) * rr;
      const y = cy + Math.sin(angle) * rr;
      if (s === 0) gfx.moveTo(x, y); else gfx.lineTo(x, y);
    }
    gfx.closePath();
    gfx.stroke();
  }
  gfx.restore();
}

// ══════════════════════════════════════
//  Drawing
// ══════════════════════════════════════
let t0 = Date.now();
let animId = null;

function draw() {
  const W=canvas.width, H=canvas.height;
  gfx.clearRect(0,0,W,H);

  // Floor
  const bg=gfx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#eaf8ea');
  bg.addColorStop(1,'#eaeeff');
  gfx.fillStyle=bg;
  gfx.fillRect(0,0,W,H);

  // Grid dots
  gfx.fillStyle='rgba(160,140,220,0.12)';
  for (let y=0;y<=ROWS;y++) for (let x=0;x<=COLS;x++) {
    gfx.beginPath();
    gfx.arc(x*cs, y*cs, 1.5, 0, Math.PI*2);
    gfx.fill();
  }

  // Walls
  gfx.strokeStyle='#4430a0';
  gfx.lineWidth=Math.max(2.5, cs*0.075);
  gfx.lineCap='round';
  for (let y=0;y<ROWS;y++) {
    for (let x=0;x<COLS;x++) {
      const wl=grid[y][x].w, px=x*cs, py=y*cs;
      if(wl[N]){gfx.beginPath();gfx.moveTo(px,py);gfx.lineTo(px+cs,py);gfx.stroke();}
      if(wl[E]){gfx.beginPath();gfx.moveTo(px+cs,py);gfx.lineTo(px+cs,py+cs);gfx.stroke();}
      if(wl[S]){gfx.beginPath();gfx.moveTo(px,py+cs);gfx.lineTo(px+cs,py+cs);gfx.stroke();}
      if(wl[W]){gfx.beginPath();gfx.moveTo(px,py);gfx.lineTo(px,py+cs);gfx.stroke();}
    }
  }

  gfx.textAlign='center';
  gfx.textBaseline='middle';

  // START
  gfx.fillStyle='#4ade80';
  gfx.shadowColor='rgba(30,180,80,0.6)';
  gfx.shadowBlur=cs*0.4;
  gfx.beginPath();
  gfx.arc(cs*0.5, cs*0.5, cs*0.46, 0, Math.PI*2);
  gfx.fill();
  gfx.shadowBlur=0;
  gfx.font=`${cs*0.52}px serif`;
  gfx.fillText('🌟', cs*0.5, cs*0.44);
  gfx.font=`bold ${cs*0.2}px sans-serif`;
  gfx.fillStyle='white';
  gfx.fillText('START', cs*0.5, cs*0.84);

  // GOAL
  const pulse = 0.93 + 0.07*Math.sin((Date.now()-t0)/350);
  const gx=(COLS-0.5)*cs, gy=(ROWS-0.5)*cs;
  gfx.fillStyle=`rgba(255,200,30,${0.25*pulse})`;
  gfx.beginPath();
  gfx.arc(gx, gy, cs*0.56*pulse, 0, Math.PI*2);
  gfx.fill();
  gfx.fillStyle='#facc15';
  gfx.shadowColor='rgba(250,180,0,0.8)';
  gfx.shadowBlur=cs*0.5;
  gfx.beginPath();
  gfx.arc(gx, gy, cs*0.46, 0, Math.PI*2);
  gfx.fill();
  gfx.shadowBlur=0;
  gfx.font=`${cs*0.62}px serif`;
  gfx.fillText('🏠', gx, gy+cs*0.04);
  gfx.font=`bold ${cs*0.2}px sans-serif`;
  gfx.fillStyle='#92400e';
  gfx.fillText('GOAL', gx, gy-cs*0.56);

  // POOPS
  for (const p of poops) {
    const ppx=(p.x+0.5)*cs, ppy=(p.y+0.5)*cs;
    gfx.font=`${cs*0.55}px serif`;
    gfx.fillText('💩', ppx, ppy+cs*0.04);
  }

  // HAMMER
  if (hammerPos && !hasHammer) {
    const hx=(hammerPos.x+0.5)*cs, hy=(hammerPos.y+0.5)*cs;
    const hb = 0.88 + 0.12*Math.sin((Date.now()-t0)/400);
    gfx.fillStyle='white';
    gfx.shadowColor='rgba(255,140,0,0.9)';
    gfx.shadowBlur=cs*0.5;
    gfx.beginPath();
    gfx.arc(hx, hy, cs*0.45*hb, 0, Math.PI*2);
    gfx.fill();
    gfx.shadowBlur=0;
    gfx.font=`${cs*0.72}px serif`;
    gfx.fillText('🔨', hx, hy+cs*0.04);
  }

  // CHECKPOINTS
  const cpColors=['rgba(255,160,190,','rgba(255,240,120,','rgba(255,190,120,'];
  for (const cp of cps) {
    if (cp.done) continue;
    const cx2=(cp.x+0.5)*cs, cy2=(cp.y+0.5)*cs;
    const p2 = 0.85 + 0.15*Math.sin((Date.now()-t0)/500 + cp.fi*2);
    gfx.fillStyle=cpColors[cp.fi]+'0.38)';
    gfx.beginPath();
    gfx.arc(cx2, cy2, cs*0.5*p2, 0, Math.PI*2);
    gfx.fill();

    // ウサギ（fi===0）はクモの巣を描画
    if (cp.fi === 0) {
      drawSpiderweb(gfx, cx2, cy2, cs*0.46);
    }

    gfx.fillStyle='#ff4466';
    gfx.font=`bold ${cs*0.22}px sans-serif`;
    gfx.fillText('！', cx2, cy2-cs*0.4);
    gfx.font=`${cs*0.58}px serif`;
    gfx.fillText(EVENTS[cp.fi].emoji, cx2, cy2+cs*0.04);

    // ウサギはクモ🕷も添える
    if (cp.fi === 0) {
      gfx.font=`${cs*0.28}px serif`;
      gfx.fillText('🕷', cx2+cs*0.3, cy2-cs*0.28);
    }
  }

  // FOLLOWERS
  for (let i = rescuedFriends.length - 1; i >= 0; i--) {
    const f = rescuedFriends[i];
    const histIdx = Math.max(0, moveHistory.length - 1 - (i + 1) * FOLLOW_DELAY);
    const pos = moveHistory[histIdx];
    const fx = (pos.x + 0.5) * cs;
    const fy = (pos.y + 0.5) * cs;
    const scale = 0.62 - i * 0.04;
    gfx.font = `${cs * scale}px serif`;
    gfx.fillText(f.emoji, fx, fy + cs * 0.04);
  }

  // PLAYER
  const px=(player.x+0.5)*cs, py=(player.y+0.5)*cs;
  currentLeader.drawPlayer(gfx, px, py, cs, t0);

  // ハンマーモード中：プレイヤー右上に強調表示
  if (hasHammer && hammerMode) {
    gfx.font=`${cs*0.38}px serif`;
    gfx.fillText('🔨', px + cs*0.28, py - cs*0.28);
  } else if (hasHammer) {
    gfx.font=`${cs*0.28}px serif`;
    gfx.fillText('🔨', px + cs*0.28, py - cs*0.28);
  }

  const anyActive = cps.some(c=>!c.done) || !goalDone;
  if (anyActive) {
    animId = requestAnimationFrame(draw);
  }
}

function startAnim() {
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(draw);
}

// ══════════════════════════════════════
//  Movement
// ══════════════════════════════════════
function move(dx, dy) {
  if (pActive || goalDone) return;
  const {x,y} = player;
  const wi = (dx===0) ? (dy<0?N:S) : (dx>0?E:W);

  if (grid[y][x].w[wi]) {
    if (hasHammer && hammerMode) breakWall(x, y, dx, dy, wi);
    return;
  }

  player.x += dx;
  player.y += dy;
  moveHistory.push({x: player.x, y: player.y});

  checkGoal();   // ゴール到達チェック（操作キャラ交代含む）を先に
  draw();
  if (!goalDone) checkTriggers();
}

function breakWall(x, y, dx, dy, wi) {
  const nx = x + dx, ny = y + dy;
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
  grid[y][x].w[wi] = 0;
  grid[ny][nx].w[oppDir(wi)] = 0;
  hasHammer = false;
  hammerMode = false;
  updateHammerBtn();

  // ── ハンマーを遠い場所に再出現 ──
  // BFSでプレイヤー現在位置から最も遠いセルを探す
  hammerPos = findFarCell(player.x, player.y);

  chime('hammer');
  draw();
  showBreakWallPopup();
}

// プレイヤー位置からBFSで最も遠いセル（ゴール・CP・うんち・現在位置を除く）を返す
function findFarCell(sx, sy) {
  const dist = Array.from({length:ROWS}, ()=>Array(COLS).fill(-1));
  const q = [{x:sx, y:sy}];
  dist[sy][sx] = 0;
  let farthest = {x:sx, y:sy};
  while (q.length) {
    const {x,y} = q.shift();
    for (const {dx,dy,w} of DIRS) {
      const nx=x+dx, ny=y+dy;
      if (nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&dist[ny][nx]===-1&&!grid[y][x].w[w]) {
        dist[ny][nx] = dist[y][x]+1;
        q.push({x:nx,y:ny});
        // 遠い候補（ゴール・現在位置・CPを除く）
        const isGoal = nx===COLS-1&&ny===ROWS-1;
        const isStart = nx===0&&ny===0;
        const isCP = cps.some(c=>c.x===nx&&c.y===ny);
        const isPoop = poops.some(p=>p.x===nx&&p.y===ny);
        if (!isGoal&&!isStart&&!isCP&&!isPoop) {
          if (dist[ny][nx] > dist[farthest.y][farthest.x]) {
            farthest = {x:nx, y:ny};
          }
        }
      }
    }
  }
  return farthest;
}

function checkTriggers() {
  // ハンマー取得
  if (hammerPos && !hasHammer &&
      player.x === hammerPos.x && player.y === hammerPos.y) {
    hasHammer = true;
    hammerMode = false;
    hammerPos = null;
    updateHammerBtn();
    chime('item');
    showHammerPopup();
    return;
  }

  // うんち判定
  const poopIdx = poops.findIndex(p => p.x===player.x && p.y===player.y);
  if (poopIdx !== -1) {
    poops.splice(poopIdx, 1);
    chime('poop');
    showPoopPopup();
    return;
  }

  // チェックポイント
  for (const cp of cps) {
    if (!cp.done && player.x===cp.x && player.y===cp.y) {
      cp.done=true;
      document.getElementById(`f${cp.fi}`).className='femoji rescued';
      document.getElementById(`fl${cp.fi}`).className='flabel rescued';
      rescuedFriends.push({ emoji: EVENTS[cp.fi].emoji, fi: cp.fi });
      totalMembers++;
      qPop(cp.fi);
      chime('rescue');
    }
  }
}

function checkGoal() {
  if (goalDone) return;
  if (player.x !== COLS-1 || player.y !== ROWS-1) return;

  // 先頭キャラがゴールに到達
  goaledCount++;

  if (goaledCount >= totalMembers) {
    // 全員ゴール
    triggerGoal();
    return;
  }

  // まだ仲間が残っている → 先頭の仲間を新しい操作キャラに昇格
  const nextFriend = rescuedFriends.shift();
  const histIdx = Math.max(0, moveHistory.length - 1 - 1 * FOLLOW_DELAY);
  const nextPos = moveHistory[histIdx];
  player = { x: nextPos.x, y: nextPos.y };
  moveHistory = moveHistory.slice(0, histIdx + 1);

  // 操作キャラを仲間の絵文字に切り替え
  const friendEmoji = nextFriend.emoji;
  currentLeader = {
    emoji: friendEmoji,
    drawPlayer(gfx, px, py, cs, t0) {
      const glow = 0.7 + 0.3 * Math.sin((Date.now()-t0)/300);
      gfx.fillStyle = `rgba(255,200,60,${0.28*glow})`;
      gfx.beginPath(); gfx.arc(px, py, cs*0.52, 0, Math.PI*2); gfx.fill();
      gfx.fillStyle = 'white';
      gfx.shadowColor = 'rgba(255,160,0,0.7)';
      gfx.shadowBlur = cs*0.4;
      gfx.beginPath(); gfx.arc(px, py, cs*0.42, 0, Math.PI*2); gfx.fill();
      gfx.shadowBlur = 0;
      gfx.font = `${cs*0.72}px serif`;
      gfx.fillText(friendEmoji, px, py);
    }
  };

  document.getElementById('headerSub').textContent =
    `${friendEmoji} つぎは ${friendEmoji} をゴールへ！（${goaledCount}/${totalMembers}）`;
}

function triggerGoal() {
  if (goalDone) return;
  goalDone = true;
  EVENTS[3].done = true;
  qPop(3);
  chime('win');
  confettiStart();
}

// ══════════════════════════════════════
//  Popup
// ══════════════════════════════════════
function qPop(i) { pQueue.push(i); if(!pActive) showPop(); }

function showPop() {
  if(!pQueue.length){pActive=false;return;}
  pActive=true;
  const idx=pQueue.shift();
  const ev=EVENTS[idx];
  document.getElementById('pEmoji').textContent=ev.emoji;
  document.getElementById('pTitle').textContent=ev.title;
  document.getElementById('pText').textContent=ev.text;
  const btn=document.getElementById('pBtn');
  if (ev.goal) {
    btn.className='pbtn restart';
    btn.textContent='もう いちど あそぶ！ 🔄';
    btn.onclick=()=>{closePop();init();startAnim();};
  } else {
    btn.className='pbtn';
    btn.textContent=ev.btn;
    btn.onclick=closePop;
  }
  document.getElementById('overlay').classList.add('show');
}

function closePop() {
  document.getElementById('overlay').classList.remove('show');
  pActive=false;
  if(pQueue.length) setTimeout(showPop, 380);
}

function showHammerPopup() {
  pActive = true;
  document.getElementById('pEmoji').textContent = '🔨';
  document.getElementById('pTitle').textContent = '🔨 ハンマーを ひろった！';
  document.getElementById('pText').textContent =
    'かべに むかって すすむと\nかべを 1かいだけ こわせるよ！\nうまく つかってね！';
  const btn = document.getElementById('pBtn');
  btn.className = 'pbtn';
  btn.textContent = 'やった！ ➡️';
  btn.onclick = closePop;
  document.getElementById('overlay').classList.add('show');
}

function toggleHammerMode() {
  if (!hasHammer) return;
  hammerMode = !hammerMode;
  updateHammerBtn();
}

function updateHammerBtn() {
  const btn = document.getElementById('bHammer');
  if (!btn) return;
  if (!hasHammer) {
    btn.classList.remove('hammer-on');
    btn.style.opacity = '0.35';
    btn.style.pointerEvents = 'none';
  } else if (hammerMode) {
    btn.classList.add('hammer-on');
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  } else {
    btn.classList.remove('hammer-on');
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  }
}

function showBreakWallPopup() {
  pActive = true;
  document.getElementById('pEmoji').textContent = '💥';
  document.getElementById('pTitle').textContent = '💥 かべを こわした！';
  document.getElementById('pText').textContent =
    'ハンマーで かべを ドーン！\nみちが ひらいたよ！\n\nハンマーは とおいばしょに\nおちているよ！とりにいこう！';
  const btn = document.getElementById('pBtn');
  btn.className = 'pbtn';
  btn.textContent = 'すすむ！ ➡️';
  btn.onclick = closePop;
  document.getElementById('overlay').classList.add('show');
}

function showPoopPopup() {
  pActive = true;
  document.getElementById('pEmoji').textContent = '💩';
  document.getElementById('pTitle').textContent = '💩 うんちを ふんだ！';
  document.getElementById('pText').textContent =
    'くさ〜い！\nスタートに もどるよ〜！\nきをつけてね！';
  const btn = document.getElementById('pBtn');
  btn.className = 'pbtn';
  btn.textContent = 'もどる…😢';
  btn.onclick = () => {
    closePop();
    returnToStart();
  };
  document.getElementById('overlay').classList.add('show');
}

function returnToStart() {
  player = {x:0, y:0};
  moveHistory = [{x:0, y:0}];
  rescuedFriends = [];
  goaledCount = 0;
  totalMembers = 1;
  EVENTS.forEach(e=>e.done=false);
  cps.forEach(cp=>cp.done=false);
  [0,1,2].forEach(i=>{
    document.getElementById(`f${i}`).className='femoji';
    document.getElementById(`fl${i}`).className='flabel';
  });
  currentLeader = { emoji: selectedChara.emoji, drawPlayer: selectedChara.drawPlayer };
  hammerMode = false;
  updateHammerBtn();
  document.getElementById('headerSub').textContent =
    `${selectedChara.emoji} ${selectedChara.name}を ゴールまで つれていこう！`;
  draw();
}

// ══════════════════════════════════════
//  Controls
// ══════════════════════════════════════
document.getElementById('bU').addEventListener('pointerdown', e=>{e.preventDefault();move(0,-1);});
document.getElementById('bD').addEventListener('pointerdown', e=>{e.preventDefault();move(0,1);});
document.getElementById('bL').addEventListener('pointerdown', e=>{e.preventDefault();move(-1,0);});
document.getElementById('bR').addEventListener('pointerdown', e=>{e.preventDefault();move(1,0);});
document.getElementById('bHammer').addEventListener('pointerdown', e=>{e.preventDefault();toggleHammerMode();});

document.addEventListener('keydown', e=>{
  const m={'ArrowUp':[0,-1],'ArrowDown':[0,1],'ArrowLeft':[-1,0],'ArrowRight':[1,0]};
  if(m[e.key]){e.preventDefault();move(...m[e.key]);}
});

let ts=null;
document.addEventListener('touchstart', e=>{
  ts={x:e.touches[0].clientX, y:e.touches[0].clientY};
},{passive:true});
document.addEventListener('touchmove', e=>{ if(ts) e.preventDefault(); },{passive:false});
document.addEventListener('touchend', e=>{
  if(!ts) return;
  const dx=e.changedTouches[0].clientX-ts.x;
  const dy=e.changedTouches[0].clientY-ts.y;
  ts=null;
  if(Math.max(Math.abs(dx),Math.abs(dy))<22) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?1:-1,0);
  else move(0,dy>0?1:-1);
},{passive:true});

// ══════════════════════════════════════
//  Sound
// ══════════════════════════════════════
let ac=null;
function getAC() { return ac||(ac=new(window.AudioContext||window.webkitAudioContext)()); }

function chime(type) {
  try {
    const a=getAC(), t=a.currentTime;
    const notes =
      type==='rescue' ? [[523,.0],[659,.13],[784,.26],[1047,.40]] :
      type==='win'    ? [[523,.0],[659,.1],[784,.2],[880,.32],[1047,.46],[880,.58],[1047,.72]] :
      type==='item'   ? [[880,.0],[1047,.14],[1320,.28]] :
      type==='hammer' ? [[300,.0],[200,.1],[150,.2]] :
      type==='poop'   ? [[300,.0],[250,.1],[200,.2],[150,.3]] :
      [];
    notes.forEach(([f,dt])=>{
      const o=a.createOscillator(), g=a.createGain();
      o.connect(g); g.connect(a.destination);
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(type==='win'?0.28:0.25, t+dt);
      g.gain.exponentialRampToValueAtTime(.0001, t+dt+.38);
      o.start(t+dt); o.stop(t+dt+.42);
    });
  } catch(_){}
}

// ══════════════════════════════════════
//  Confetti
// ══════════════════════════════════════
const cf = document.getElementById('cfCanvas');
const cfx = cf.getContext('2d');
let pieces=[], cfGoing=false;
const CCOLS=['#ff6b9d','#ffd43b','#74c0fc','#69db7c','#ff9f43','#da77f2','#ff6b6b'];

function confettiStart() {
  cf.width=window.innerWidth; cf.height=window.innerHeight;
  pieces=Array.from({length:100},()=>({
    x:Math.random()*cf.width, y:-30,
    vx:(Math.random()-.5)*6, vy:Math.random()*4+1.5,
    col:CCOLS[Math.floor(Math.random()*CCOLS.length)],
    s:Math.random()*9+5, r:Math.random()*Math.PI*2, vr:(Math.random()-.5)*.18
  }));
  if(!cfGoing){cfGoing=true;cfLoop();}
}
function cfLoop() {
  cfx.clearRect(0,0,cf.width,cf.height);
  pieces.forEach(p=>{
    p.x+=p.vx; p.vy+=.07; p.y+=p.vy; p.r+=p.vr;
    cfx.save(); cfx.translate(p.x,p.y); cfx.rotate(p.r);
    cfx.fillStyle=p.col; cfx.fillRect(-p.s/2,-p.s/2,p.s,p.s);
    cfx.restore();
  });
  pieces=pieces.filter(p=>p.y<cf.height+30);
  if(pieces.length){requestAnimationFrame(cfLoop);}
  else{cfGoing=false;}
}
