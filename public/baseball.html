<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚾ バッティングあそび</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
html, body { width:100%; height:100dvh; overflow:hidden; font-family:'Hiragino Maru Gothic Pro','BIZ UDPGothic',sans-serif; background:#1a1a2e; }
#gameCanvas { display:block; width:100%; height:100dvh; }

#ui {
  position:fixed; top:0; left:0; width:100%; height:100dvh;
  pointer-events:none;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  padding-bottom: max(28px, env(safe-area-inset-bottom));
  z-index:10;
}

#result {
  position:fixed; top:38%; left:50%; transform:translate(-50%,-50%);
  font-size:64px; font-weight:900; text-align:center;
  pointer-events:none; z-index:20;
  opacity:0; transition:none;
  text-shadow: 0 4px 16px rgba(0,0,0,0.6);
  line-height:1.1;
}
#result.show { animation: resultPop 1.9s ease-out forwards; }
@keyframes resultPop {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(0.4); }
  20%  { opacity:1; transform:translate(-50%,-50%) scale(1.2); }
  40%  { transform:translate(-50%,-50%) scale(1); }
  72%  { opacity:1; transform:translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-68%) scale(0.85); }
}

#swingBtn {
  pointer-events:all;
  border:none; outline:none; cursor:pointer;
  border-radius:999px;
  font-family:inherit; font-weight:900;
  transition: transform 0.1s cubic-bezier(.34,1.56,.64,1), box-shadow 0.1s;
  -webkit-tap-highlight-color:transparent;
  padding:22px 0;
  width:240px;
  font-size:28px;
  background:linear-gradient(145deg,#ff4d6d,#c9184a);
  color:white;
  box-shadow:0 6px 24px rgba(201,24,74,0.6), 0 4px 0 #7b0d29;
  letter-spacing:2px;
}
#swingBtn:active { transform:scale(0.91); box-shadow:0 2px 8px rgba(201,24,74,0.4); }
#swingBtn.disabled { opacity:0.35; pointer-events:none; }

#homeBtn {
  position:fixed; top:16px; left:16px;
  pointer-events:all;
  background:rgba(255,255,255,0.18);
  border:2px solid rgba(255,255,255,0.3);
  color:white; font-size:14px; font-weight:900;
  padding:8px 14px; border-radius:999px;
  cursor:pointer; font-family:inherit;
  backdrop-filter:blur(4px);
  z-index:30;
}
#homeBtn:active { transform:scale(0.9); }

#scoreDisplay {
  position:fixed; top:16px; right:16px;
  pointer-events:none; z-index:30;
  background:rgba(0,0,0,0.45);
  border:2px solid rgba(255,255,255,0.2);
  border-radius:16px;
  padding:8px 14px;
  color:white; font-size:13px; font-weight:900;
  text-align:center;
  backdrop-filter:blur(4px);
}
#scoreDisplay .big { font-size:20px; display:block; }

#readyMsg {
  position:fixed; top:28%; left:50%; transform:translate(-50%,-50%);
  font-size:38px; font-weight:900; color:white;
  text-shadow:0 3px 12px rgba(0,0,0,0.8);
  pointer-events:none; z-index:25;
  opacity:0; transition:opacity 0.4s;
  text-align:center;
}
#readyMsg.show { opacity:1; }

#particleCanvas {
  position:fixed; top:0; left:0; width:100%; height:100dvh;
  pointer-events:none; z-index:15;
}

/* Game Over overlay */
#gameOverlay {
  position:fixed; top:0; left:0; width:100%; height:100dvh;
  background:rgba(0,0,30,0.88);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:50; pointer-events:all;
  opacity:0; transition:opacity 0.5s;
  pointer-events:none;
}
#gameOverlay.show { opacity:1; pointer-events:all; }
#gameOverlay h2 {
  font-size:52px; font-weight:900; color:#ffdd00;
  text-shadow:0 4px 16px rgba(0,0,0,0.6);
  margin-bottom:32px; letter-spacing:2px;
}
.stat-row {
  display:flex; align-items:center; gap:16px;
  margin-bottom:16px;
}
.stat-label { font-size:22px; color:#aaddff; font-weight:700; }
.stat-val   { font-size:40px; font-weight:900; color:white; min-width:70px; text-align:right; }
.stat-unit  { font-size:18px; color:#88aacc; }
#retryBtn {
  margin-top:36px;
  padding:18px 52px; border-radius:999px; border:none; outline:none;
  font-family:inherit; font-weight:900; font-size:26px;
  background:linear-gradient(145deg,#ff4d6d,#c9184a);
  color:white; cursor:pointer;
  box-shadow:0 6px 24px rgba(201,24,74,0.5), 0 4px 0 #7b0d29;
  letter-spacing:2px;
}
#retryBtn:active { transform:scale(0.92); }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div id="result"></div>
<div id="readyMsg">⚾ じゅんびして！</div>

<button id="homeBtn">🏠 もどる</button>

<div id="scoreDisplay">
  <span class="big" id="pitchDisplay">1/5</span>
  きゅう
</div>

<div id="ui">
  <button id="swingBtn" class="disabled">🏏 ふる！</button>
</div>

<!-- Game Over overlay -->
<div id="gameOverlay">
  <h2>⚾ けっか！</h2>
  <div class="stat-row">
    <span class="stat-label">あんだすう</span>
    <span class="stat-val" id="goHits">0</span>
    <span class="stat-unit">ほん</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">ホームランすう</span>
    <span class="stat-val" id="goHR">0</span>
    <span class="stat-unit">ほん</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">だりつ</span>
    <span class="stat-val" id="goAvg">.000</span>
    <span class="stat-unit"></span>
  </div>
  <button id="retryBtn">もういちど！</button>
</div>

<script>
// ─── Canvas setup ─────────────────────────────────────────────────
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const pCanvas = document.getElementById('particleCanvas');
const pCtx    = pCanvas.getContext('2d');

function resize() {
  canvas.width = pCanvas.width = window.innerWidth;
  canvas.height = pCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── State ────────────────────────────────────────────────────────
const STATE = { IDLE:0, READY:1, PITCHING:2, RESULT:3, GAMEOVER:4 };
let state          = STATE.IDLE;
let stateTimer     = 0;  // ms elapsed in current state; reset to 0 on each transition
let readyPhase     = 0;
let readyPhase2Timer = 0;  // ms elapsed since readyPhase became 1

// ─── Game stats ───────────────────────────────────────────────────
const MAX_PITCHES = 5;
let pitchCount    = 0;   // pitches thrown this game (1-5)
let hitCountGame  = 0;   // single/fly hits (not homerun)
let homerunCount  = 0;

// ─── Pitch state ──────────────────────────────────────────────────
let ballProgress     = -1;
let pitchDuration    = 1300;
let isStrike         = true;
let pitchOffsetX     = 0;
let pitchType        = 'normal';
let swungDuringPitch = false;
let particles        = [];
let flyBallAnim      = null;
let batterSwing      = false;
let batterSwingT     = 0;

const swingBtn    = document.getElementById('swingBtn');
const readyMsgEl  = document.getElementById('readyMsg');
const pitchDisplay = document.getElementById('pitchDisplay');

// ─── Scene ────────────────────────────────────────────────────────
function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  drawField(W, H);
  drawFielders(W, H);
  drawStrikeZone(W, H);
  drawPitcher(W, H);
  drawBatter(W, H);
  if (ballProgress >= 0 && state === STATE.PITCHING) drawBall(W, H);
  if (flyBallAnim) drawFlyBall(W, H);
}

// ── Geometry helpers ─────────────────────────────────────────────
function getMoundY(W, H) {
  const homeY   = H * 0.895;
  const secondY = homeY - W * 0.40;
  return secondY + (homeY - secondY) * 0.45;
}

// ── Field ─────────────────────────────────────────────────────────
function drawField(W, H) {
  const hY = H * 0.40;

  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, hY);
  sky.addColorStop(0, '#1a4a8a'); sky.addColorStop(1, '#3a7abf');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, hY);

  // Stands
  const standGrad = ctx.createLinearGradient(0, 0, 0, hY);
  standGrad.addColorStop(0, '#1a2a7a'); standGrad.addColorStop(1, '#2a3a99');
  ctx.fillStyle = standGrad;
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(W,0); ctx.lineTo(W, hY*0.82); ctx.lineTo(0, hY*0.82);
  ctx.fill();

  // Crowd dots
  ctx.fillStyle = 'rgba(255,200,100,0.28)';
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 32; col++) {
      ctx.beginPath();
      ctx.arc(col*(W/31)+(row%2)*9, row*(hY*0.13)+6, 3, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Scoreboard
  ctx.fillStyle = '#0d1144';
  ctx.fillRect(W*0.36, hY*0.04, W*0.28, hY*0.38);
  ctx.fillStyle = '#ffdd00';
  ctx.font = `bold ${Math.floor(W*0.024)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('BALL PARK', W*0.5, hY*0.2);
  ctx.fillStyle = '#ff5555';
  ctx.fillText('⚾ あそぼう！', W*0.5, hY*0.35);

  // Outfield fence — curved like a real stadium
  const fenceSideY = hY * 0.88;   // fence top near foul lines
  const fenceMidY  = hY * 0.68;   // fence top at center field (deepest)
  const wallThick  = hY * 0.058;  // fence wall thickness
  ctx.fillStyle = '#1e3a1a';
  ctx.beginPath();
  ctx.moveTo(0, fenceSideY);
  ctx.quadraticCurveTo(W * 0.5, fenceMidY, W, fenceSideY);
  ctx.lineTo(W, fenceSideY + wallThick);
  ctx.quadraticCurveTo(W * 0.5, fenceMidY + wallThick, 0, fenceSideY + wallThick);
  ctx.closePath();
  ctx.fill();
  // Fence top highlight
  ctx.strokeStyle = '#3a6a3a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, fenceSideY);
  ctx.quadraticCurveTo(W * 0.5, fenceMidY, W, fenceSideY);
  ctx.stroke();

  // Outfield grass (starts just below the curved fence)
  const grassGrad = ctx.createLinearGradient(0, hY, 0, H);
  grassGrad.addColorStop(0, '#267026'); grassGrad.addColorStop(0.4, '#3a9a3a'); grassGrad.addColorStop(1, '#267a26');
  ctx.fillStyle = grassGrad;
  ctx.beginPath();
  ctx.moveTo(0, fenceSideY + wallThick);
  ctx.quadraticCurveTo(W * 0.5, fenceMidY + wallThick, W, fenceSideY + wallThick);
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // Grass stripes
  for (let i = 0; i < 7; i++) {
    const y0 = hY + (H - hY) * (i / 7);
    const y1 = hY + (H - hY) * ((i + 0.5) / 7);
    ctx.fillStyle = i%2===0 ? 'rgba(80,180,80,0.12)' : 'rgba(20,80,20,0.12)';
    ctx.fillRect(0, y0, W, y1 - y0);
  }

  // Infield dirt (diamond)
  const homeX   = W * 0.5, homeY = H * 0.895;
  const firstX  = W * 0.70, firstY  = homeY - W * 0.20;
  const secondX = W * 0.5,  secondY = homeY - W * 0.40;
  const thirdX  = W * 0.30, thirdY  = homeY - W * 0.20;

  const dirtGrad = ctx.createLinearGradient(0, secondY, 0, homeY);
  dirtGrad.addColorStop(0, '#7a4a20'); dirtGrad.addColorStop(1, '#c8874a');
  ctx.fillStyle = dirtGrad;
  ctx.beginPath();
  ctx.moveTo(homeX, homeY);
  ctx.lineTo(firstX, firstY);
  // Rounded arc from 1st base, bulging behind 2nd base, to 3rd base
  ctx.quadraticCurveTo(secondX, secondY - W * 0.09, thirdX, thirdY);
  ctx.lineTo(homeX, homeY);
  ctx.fill();

  // Pitcher's mound
  const moundY = getMoundY(W, H);
  ctx.fillStyle = '#a06428';
  ctx.beginPath();
  ctx.ellipse(W*0.5, moundY, W*0.038, (homeY - secondY)*0.048, 0, 0, Math.PI*2);
  ctx.fill();

  // Bases
  ctx.save(); ctx.translate(secondX, secondY);
  ctx.rotate(Math.PI/4);
  ctx.fillStyle = 'white'; ctx.fillRect(-6, -4, 12, 8); ctx.restore();

  ctx.save(); ctx.translate(firstX, firstY);
  ctx.rotate(Math.PI/4);
  ctx.fillStyle = 'white'; ctx.fillRect(-7, -5, 14, 10); ctx.restore();

  ctx.save(); ctx.translate(thirdX, thirdY);
  ctx.rotate(Math.PI/4);
  ctx.fillStyle = 'white'; ctx.fillRect(-7, -5, 14, 10); ctx.restore();

  // Foul lines
  const foulEndY = Math.max(0, homeY - W * 0.5);
  ctx.strokeStyle = 'rgba(255,255,255,0.60)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(homeX, homeY); ctx.lineTo(0, foulEndY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(homeX, homeY); ctx.lineTo(W, foulEndY); ctx.stroke();

  // Home plate
  ctx.fillStyle = 'white';
  ctx.save();
  ctx.translate(homeX, homeY);
  ctx.beginPath();
  ctx.moveTo(0, -14); ctx.lineTo(18, -5); ctx.lineTo(18, 9);
  ctx.lineTo(-18, 9); ctx.lineTo(-18, -5);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ── Fielders ──────────────────────────────────────────────────────
function drawFielder(x, y, sz, uniform) {
  ctx.fillStyle = '#fdbcb4';
  ctx.beginPath();
  ctx.arc(x, y - sz * 0.80, sz * 0.18, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = uniform || '#cc2222';
  ctx.beginPath();
  ctx.arc(x, y - sz * 0.88, sz * 0.20, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(x - sz * 0.26, y - sz * 0.90, sz * 0.52, sz * 0.06);
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.ellipse(x, y - sz * 0.50, sz * 0.15, sz * 0.28, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = uniform || '#cc2222';
  ctx.beginPath();
  ctx.ellipse(x, y - sz * 0.50, sz * 0.15, sz * 0.28, 0, 0, Math.PI * 2);
  ctx.globalAlpha = 0.25; ctx.fill(); ctx.globalAlpha = 1;
  ctx.strokeStyle = '#1a1a6e';
  ctx.lineWidth = Math.max(1, sz * 0.10);
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x - sz*0.05, y - sz*0.22); ctx.lineTo(x - sz*0.07, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + sz*0.05, y - sz*0.22); ctx.lineTo(x + sz*0.07, y); ctx.stroke();
}

function drawFielders(W, H) {
  const hY = H * 0.40;
  const sc = (y) => H * 0.020 + (y - hY) / (H - hY) * H * 0.052;

  const ofY = hY + (H - hY) * 0.11;
  drawFielder(W * 0.17, ofY,                       sc(ofY),  '#cc2222');
  drawFielder(W * 0.50, hY + (H - hY) * 0.05,      sc(hY+(H-hY)*0.05), '#cc2222');
  drawFielder(W * 0.83, ofY,                       sc(ofY),  '#cc2222');

  const mifY = hY + (H - hY) * 0.38;
  drawFielder(W * 0.34, mifY, sc(mifY), '#cc2222');
  drawFielder(W * 0.66, mifY, sc(mifY), '#cc2222');

  const homeY = H * 0.895;
  const y1B   = homeY - W * 0.20;
  drawFielder(W * 0.74, y1B, sc(y1B), '#cc2222');
  drawFielder(W * 0.26, y1B, sc(y1B), '#cc2222');
}

// ── Strike zone ───────────────────────────────────────────────────
function drawStrikeZone(W, H) {
  // positioned near the ball's arrival area so it feels aligned
  const moundY   = getMoundY(W, H);
  const homeY    = H * 0.895;
  const arrivalY = moundY + (homeY - moundY) * 0.65;
  const zW = W * 0.19;
  const zH = H * 0.065;
  const zX = W * 0.5 - zW / 2;
  const zY = arrivalY - zH * 1.2;

  ctx.shadowColor = 'rgba(255,255,80,0.5)';
  ctx.shadowBlur = 8;
  ctx.strokeStyle = 'rgba(255,255,80,0.65)';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([9, 5]);
  ctx.strokeRect(zX, zY, zW, zH);
  ctx.setLineDash([]);
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(255,255,80,0.55)';
  ctx.font = `bold ${Math.floor(W*0.023)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('ストライク', W*0.5, zY - 7);
}

// ── Pitcher ───────────────────────────────────────────────────────
function drawPitcher(W, H) {
  const hY     = H * 0.40;
  const moundY = getMoundY(W, H);
  const px     = W * 0.5;
  const py     = moundY;

  // Perspective-correct size (same formula as fielders)
  const s = H * 0.020 + (py - hY) / (H - hY) * H * 0.052;

  const wind = (state === STATE.PITCHING && ballProgress < 0.18) ? ballProgress / 0.18 : 0;

  // Body
  ctx.fillStyle = '#cc2222';
  ctx.beginPath(); ctx.ellipse(px, py, s*0.45, s*0.62, 0, 0, Math.PI*2); ctx.fill();

  // Head
  ctx.fillStyle = '#fdbcb4';
  ctx.beginPath(); ctx.arc(px, py - s*0.82, s*0.35, 0, Math.PI*2); ctx.fill();

  // Cap (same team color as uniform)
  ctx.fillStyle = '#cc2222';
  ctx.beginPath(); ctx.arc(px, py - s*0.95, s*0.36, Math.PI, 0); ctx.fill();
  ctx.fillRect(px - s*0.52, py - s*0.97, s*1.04, s*0.08);

  // Pitching arm
  ctx.strokeStyle = '#fdbcb4'; ctx.lineWidth = s*0.3; ctx.lineCap = 'round';
  const armAngle = -Math.PI/2 - wind * Math.PI * 0.9;
  ctx.beginPath();
  ctx.moveTo(px, py - s*0.2);
  ctx.lineTo(px + Math.cos(armAngle)*s*1.1, py + Math.sin(armAngle)*s*1.1);
  ctx.stroke();
}

// ── Ball ──────────────────────────────────────────────────────────
function drawBall(W, H) {
  const moundY   = getMoundY(W, H);
  const homeY    = H * 0.895;
  // Ball travels from just above pitcher's hand to near home plate
  const pitcherY = moundY - (homeY - moundY) * 0.22;  // release point above mound
  const arrivalY = moundY + (homeY - moundY) * 0.65;  // arrival near home plate area
  const p = ballProgress;

  const bx = W * 0.5 + pitchOffsetX * p * p;
  const by = pitcherY + (arrivalY - pitcherY) * p;
  const br = 4 + p * p * 16;

  // Ground shadow (travels from mound toward home plate)
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath();
  ctx.ellipse(W*0.5 + pitchOffsetX*p*p, moundY + (homeY - moundY) * 0.72 * p, br*1.6, br*0.38, 0, 0, Math.PI*2);
  ctx.fill();

  const bg = ctx.createRadialGradient(bx - br*0.32, by - br*0.32, br*0.08, bx, by, br);
  bg.addColorStop(0, '#ffffff'); bg.addColorStop(1, '#d8d8d8');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();

  ctx.strokeStyle = '#cc3333';
  ctx.lineWidth = Math.max(0.8, br * 0.16);
  ctx.beginPath(); ctx.arc(bx - br*0.28, by, br*0.68, -0.55, 0.55); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx + br*0.28, by, br*0.68, Math.PI-0.55, Math.PI+0.55); ctx.stroke();
}

// ── Batter ────────────────────────────────────────────────────────
function drawBatter(W, H) {
  const bx   = W * 0.80;
  const feet = H * 0.86;
  const s    = H * 0.19;
  const sw   = batterSwing ? Math.min(1, batterSwingT) : 0;

  // Legs
  ctx.strokeStyle = '#1a1a6e'; ctx.lineWidth = s*0.11; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(bx - s*0.05, feet); ctx.lineTo(bx - s*0.02, feet - s*0.42); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx - s*0.22, feet); ctx.lineTo(bx - s*0.14, feet - s*0.44); ctx.stroke();

  // Body
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.ellipse(bx - s*0.12, feet - s*0.63, s*0.13, s*0.22, -0.12, 0, Math.PI*2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#fdbcb4';
  ctx.beginPath(); ctx.arc(bx - s*0.16, feet - s*0.94, s*0.13, 0, Math.PI*2); ctx.fill();

  // Helmet
  ctx.fillStyle = '#1a1a6e';
  ctx.beginPath(); ctx.arc(bx - s*0.16, feet - s*1.02, s*0.145, Math.PI*0.75, Math.PI*2.25); ctx.fill();
  ctx.fillRect(bx - s*0.34, feet - s*1.08, s*0.35, s*0.08);
  ctx.beginPath(); ctx.arc(bx - s*0.03, feet - s*0.92, s*0.08, 0, Math.PI*2); ctx.fill();

  // Bat angles — rest upper-right (held back), contact aligned with ball position, follow-through upper-left (wrap over front shoulder)
  const restAngle    =  Math.PI * 0.32;   // bat held back upper-right
  const contactAngle = -Math.PI * 0.72;   // barrel at ball position (lower-left, aligns with pitch at p=0.84)
  const followAngle  = -Math.PI * 0.28;   // follow-through: barrel wraps to upper-left (clockwise from contact = natural wrap-around)

  let batAngle;
  if (sw < 0.52) {
    batAngle = restAngle + (contactAngle - restAngle) * (sw / 0.52);
  } else {
    batAngle = contactAngle + (followAngle - contactAngle) * ((sw - 0.52) / 0.48);
  }

  const batLen = s * 0.90;
  const gripX  = bx - s * 0.06;
  const gripY  = feet - s * 0.70;

  // Motion trail
  if (sw > 0.05 && sw < 0.90) {
    for (let m = 1; m <= 4; m++) {
      ctx.save();
      ctx.translate(gripX, gripY);
      // Forward swing: angle decreases, trail at batAngle + offset (where bat came from)
      // Follow-through: angle increases, trail at batAngle - offset (where bat came from)
      const trailDir  = sw < 0.52 ? 1 : -1;
      const trailAngle = batAngle + trailDir * m * 0.18;
      ctx.rotate(trailAngle);
      ctx.globalAlpha = 0.07;
      ctx.fillStyle = '#8B4513';
      const tw = s * 0.05;
      ctx.beginPath();
      ctx.moveTo(-tw*0.3, 0); ctx.lineTo(tw*0.3, 0);
      ctx.lineTo(tw*1.1, -batLen); ctx.lineTo(-tw*1.1, -batLen);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // Bat body
  ctx.save();
  ctx.translate(gripX, gripY);
  ctx.rotate(batAngle);

  const handleW = s * 0.030;
  const throatW = s * 0.022;
  const barrelW = s * 0.100;

  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.moveTo(-handleW, 0);
  ctx.bezierCurveTo(-handleW, -batLen*0.22, -throatW, -batLen*0.28, -throatW, -batLen*0.38);
  ctx.bezierCurveTo(-throatW, -batLen*0.52, -barrelW, -batLen*0.68, -barrelW, -batLen*0.80);
  ctx.lineTo(-barrelW, -batLen);
  ctx.lineTo( barrelW, -batLen);
  ctx.lineTo( barrelW, -batLen*0.80);
  ctx.bezierCurveTo( barrelW, -batLen*0.68,  throatW, -batLen*0.52,  throatW, -batLen*0.38);
  ctx.bezierCurveTo( throatW, -batLen*0.28,  handleW, -batLen*0.22,  handleW, 0);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#3a1800';
  ctx.fillRect(-handleW, -s*0.10, handleW*2, s*0.10);

  ctx.fillStyle = 'rgba(255,220,180,0.35)';
  ctx.beginPath();
  ctx.ellipse(-barrelW*0.3, -batLen*0.90, barrelW*0.28, batLen*0.06, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = '#a0522d';
  ctx.beginPath();
  ctx.ellipse(0, -batLen, barrelW, barrelW*0.38, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();

  // Whoosh arc (forward swing only — hide during follow-through to avoid backwards-arc artifact)
  if (sw > 0.1 && sw < 0.54) {
    ctx.save();
    ctx.translate(gripX, gripY - batLen * 0.85);
    ctx.strokeStyle = 'rgba(200,230,255,0.45)';
    ctx.lineWidth = 3;
    // arc from restAngle side to current batAngle (going counterclockwise = swinging left)
    const startA = restAngle - Math.PI/2;
    const endA   = batAngle  - Math.PI/2;
    ctx.beginPath();
    ctx.arc(0, 0, batLen * 0.82, endA, startA);  // clockwise from end to start (arc behind bat)
    ctx.stroke();
    ctx.restore();
  }
}

// ── Fly ball ──────────────────────────────────────────────────────
function drawFlyBall(W, H) {
  if (!flyBallAnim) return;
  const p  = flyBallAnim.progress;
  const bx = flyBallAnim.x + (flyBallAnim.tx - flyBallAnim.x) * p;
  const by = flyBallAnim.y + (flyBallAnim.ty - flyBallAnim.y) * p - Math.sin(p * Math.PI) * H * 0.32;
  const r  = 12 + (1 - p) * 5;

  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#cc3333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(bx - r*0.28, by, r*0.66, -0.5, 0.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx + r*0.28, by, r*0.66, Math.PI-0.5, Math.PI+0.5); ctx.stroke();
}

// ─── Timing judgment ──────────────────────────────────────────────
// "Good" contact = ball has traveled ~84% of the way (near batter, barrel over home plate)
function getTimingScore(progress) {
  const center     = 0.84;
  const halfWindow = 0.13;
  const dist = Math.abs(progress - center);
  if (dist > halfWindow * 2.4) return 0;
  return Math.max(0, 1 - dist / halfWindow);
}

function judgeResult(didSwing, progress, strikeZone) {
  if (!didSwing) {
    return strikeZone
      ? { text:'みのがし…', sub:'ストライク！', color:'#ffcc00', type:'strike' }
      : { text:'ボール！',   sub:'よけた！',     color:'#44aaff', type:'ball'   };
  }
  const score = getTimingScore(progress);
  if (score >= 0.84) {
    return { text:'ホームラン！！', sub:'🎆 かんぺき！', color:'#ff4400', type:'homerun' };
  } else if (score >= 0.52) {
    return Math.random() < 0.55
      ? { text:'ヒット！',  sub:'⚾ うまい！',   color:'#ffdd00', type:'hit' }
      : { text:'ぼんだ！',  sub:'フライボール', color:'#88ff44', type:'fly' };
  } else if (score >= 0.18) {
    return { text:'ファール',   sub:'おしい…',  color:'#ff8844', type:'foul' };
  } else {
    return { text:'からぶり！', sub:'ミス…',    color:'#ff44aa', type:'miss' };
  }
}

// ─── Particles ────────────────────────────────────────────────────
function spawnParticles(x, y, color, count, type) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 4 + Math.random() * (type === 'homerun' ? 14 : 7);
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - (type === 'homerun' ? 8 : 3),
      life: 1, decay: 0.017 + Math.random() * 0.02,
      size: 4 + Math.random() * (type === 'homerun' ? 10 : 6),
      color: type === 'homerun'
        ? ['#ff4400','#ffdd00','#ff88ff','#00eeff'][Math.floor(Math.random()*4)]
        : color
    });
  }
}

function updateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  // 先に全パーティクルを更新してから dead を除去する。
  // filter を先にすると「life がほぼ 0 の粒子」が filter を通過した後 decay で
  // マイナスになり、arc() にマイナス半径を渡して例外 → rAF ループ停止する。
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.38; p.life -= p.decay;
  });
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    pCtx.globalAlpha = p.life;
    pCtx.fillStyle = p.color;
    pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); pCtx.fill();
  });
  pCtx.globalAlpha = 1;
}

// ─── State transitions ────────────────────────────────────────────
function enterIdle() {
  state        = STATE.IDLE;
  stateTimer   = 0;
  batterSwing  = false;
  batterSwingT = 0;
  swingBtn.classList.add('disabled');
}

function enterReady() {
  state            = STATE.READY;
  stateTimer       = 0;
  readyPhase       = 0;
  readyPhase2Timer = 0;
  swingBtn.classList.add('disabled');
  readyMsgEl.textContent = '⚾ じゅんびして！';
  readyMsgEl.classList.add('show');
}

function setupPitch() {
  isStrike      = Math.random() < 0.72;
  pitchType     = Math.random() < 0.35 ? 'fast' : (Math.random() < 0.5 ? 'slow' : 'normal');
  pitchDuration = pitchType === 'fast' ? 920 : (pitchType === 'slow' ? 1850 : 1280);

  if (isStrike) {
    pitchOffsetX = (Math.random() - 0.5) * canvas.width * 0.055;
  } else {
    pitchOffsetX = (Math.random() > 0.5 ? 1 : -1) * canvas.width * (0.14 + Math.random() * 0.06);
  }

  const label = pitchType === 'fast' ? '🔥 はやいたまだ！'
              : pitchType === 'slow' ? '🌀 ゆっくりくるよ…'
              :                        '⚾ いくよ！';
  readyMsgEl.textContent = label;
}

function enterPitching() {
  state            = STATE.PITCHING;
  stateTimer       = 0;
  ballProgress     = 0;
  swungDuringPitch = false;
  batterSwing      = false;
  batterSwingT     = 0;
  flyBallAnim      = null;  // clear any lingering fly ball
  readyMsgEl.classList.remove('show');
  swingBtn.classList.remove('disabled');
  pitchCount++;
  updatePitchDisplay();
}

function updatePitchDisplay() {
  pitchDisplay.textContent = `${Math.min(pitchCount, MAX_PITCHES)}/${MAX_PITCHES}`;
}

function finishPitch(didSwing, progress) {
  state        = STATE.RESULT;
  stateTimer   = 0;
  ballProgress = -1;
  swingBtn.classList.add('disabled');  // 常にボタン無効化（スイングなし時の取り残し防止）

  const result = judgeResult(didSwing, progress, isStrike);
  showResult(result);

  if (result.type === 'hit') {
    hitCountGame++;
    launchFlyBall(false);
  } else if (result.type === 'homerun') {
    homerunCount++;
    launchFlyBall(true);
  } else if (result.type === 'fly') {
    launchFlyBall(false);
  }

  const W = canvas.width, H = canvas.height;
  const cx = W * 0.5, cy = H * 0.58;
  if (result.type === 'homerun')                               spawnParticles(cx, cy, result.color, 80, 'homerun');
  else if (result.type === 'hit' || result.type === 'fly')     spawnParticles(cx, cy, result.color, 40, 'hit');
  else if (result.type === 'miss' || result.type === 'strike') spawnParticles(cx, cy, '#8888aa', 18, 'miss');
}

function swing() {
  if (state !== STATE.PITCHING || swungDuringPitch) return;
  const captured   = ballProgress;
  swungDuringPitch = true;
  batterSwing      = true;
  batterSwingT     = 0;
  swingBtn.classList.add('disabled');
  finishPitch(true, captured);
}

function showResult(result) {
  const el = document.getElementById('result');
  el.style.color = result.color;
  el.innerHTML   = result.text + (result.sub
    ? `<br><span style="font-size:26px;opacity:0.88">${result.sub}</span>` : '');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  el.addEventListener('animationend', () => el.classList.remove('show'), { once: true });
}

function launchFlyBall(homerun) {
  const W = canvas.width, H = canvas.height;
  flyBallAnim = {
    x: W * 0.5, y: H * 0.60,
    tx: homerun ? W * 0.5 : W * (0.22 + Math.random() * 0.56),
    ty: homerun ? H * 0.04 : H * (0.12 + Math.random() * 0.22),
    progress: 0
  };
}

// ─── Game Over ────────────────────────────────────────────────────
function enterGameOver() {
  state      = STATE.GAMEOVER;
  stateTimer = 0;
  swingBtn.classList.add('disabled');
  readyMsgEl.classList.remove('show');

  // Compute batting average: (hits + homeruns) / MAX_PITCHES
  const totalHits = hitCountGame + homerunCount;
  const avg = totalHits / MAX_PITCHES;
  const avgStr = avg === 0 ? '.000'
    : '.' + String(Math.round(avg * 1000)).padStart(3, '0');

  document.getElementById('goHits').textContent = hitCountGame;
  document.getElementById('goHR').textContent   = homerunCount;
  document.getElementById('goAvg').textContent  = avgStr;

  document.getElementById('gameOverlay').classList.add('show');
}

function resetGame() {
  pitchCount   = 0;
  hitCountGame = 0;
  homerunCount = 0;
  particles    = [];
  flyBallAnim  = null;
  batterSwing  = false;
  batterSwingT = 0;
  document.getElementById('gameOverlay').classList.remove('show');
  updatePitchDisplay();
  enterIdle();
}

// ─── Game loop ────────────────────────────────────────────────────
let lastTs = 0;

function loop(ts) {
  if (lastTs === 0) lastTs = ts;
  const dt = Math.min(ts - lastTs, 50);
  lastTs = ts;

  // stateTimer accumulates dt — never negative, immune to timestamp drift
  stateTimer += dt;

  if (state === STATE.IDLE) {
    if (stateTimer > 400) enterReady();

  } else if (state === STATE.READY) {
    if (readyPhase === 0 && stateTimer > 700) {
      readyPhase       = 1;
      readyPhase2Timer = 0;
      setupPitch();
    }
    if (readyPhase === 1) {
      readyPhase2Timer += dt;
      if (readyPhase2Timer > 650) enterPitching();
    }

  } else if (state === STATE.PITCHING) {
    ballProgress = Math.min(1, stateTimer / pitchDuration);
    if (batterSwing) batterSwingT += dt / 200;
    if (ballProgress >= 1 && !swungDuringPitch) {
      finishPitch(false, 1.0);
    }

  } else if (state === STATE.RESULT) {
    if (batterSwing) {
      batterSwingT = Math.min(1, batterSwingT + dt / 200);
    }
    if (stateTimer > 2200) {
      if (pitchCount >= MAX_PITCHES) {
        enterGameOver();
      } else {
        enterIdle();
      }
    }
  }
  // GAMEOVER: no auto-transitions; wait for retry button

  if (flyBallAnim) {
    flyBallAnim.progress += dt / 1800;
    if (flyBallAnim.progress >= 1) flyBallAnim = null;
  }

  drawScene();
  updateParticles();
  requestAnimationFrame(loop);
}

// ─── Events ───────────────────────────────────────────────────────
swingBtn.addEventListener('click', swing);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (state === STATE.PITCHING) swing();
  }
});
document.getElementById('homeBtn').addEventListener('click', () => { location.href = './index.html'; });
document.getElementById('retryBtn').addEventListener('click', () => resetGame());

// ─── Boot ─────────────────────────────────────────────────────────
updatePitchDisplay();
requestAnimationFrame(loop);
</script>
</body>
