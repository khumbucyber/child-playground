<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚾ バッティングあそび</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
html, body { width:100%; height:100dvh; overflow:hidden; font-family:'Hiragino Maru Gothic Pro','BIZ UDPGothic',sans-serif; background:#1a1a2e; }
#gameCanvas { display:block; width:100%; height:100dvh; }

#ui {
  position:fixed; top:0; left:0; width:100%; height:100dvh;
  pointer-events:none;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  padding-bottom: max(28px, env(safe-area-inset-bottom));
  z-index:10;
}

#result {
  position:fixed; top:38%; left:50%; transform:translate(-50%,-50%);
  font-size:64px; font-weight:900; text-align:center;
  pointer-events:none; z-index:20;
  opacity:0; transition:none;
  text-shadow: 0 4px 16px rgba(0,0,0,0.6);
  line-height:1.1;
}
#result.show { animation: resultPop 1.9s ease-out forwards; }
@keyframes resultPop {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(0.4); }
  20%  { opacity:1; transform:translate(-50%,-50%) scale(1.2); }
  40%  { transform:translate(-50%,-50%) scale(1); }
  72%  { opacity:1; transform:translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-68%) scale(0.85); }
}

#swingBtn {
  pointer-events:all;
  border:none; outline:none; cursor:pointer;
  border-radius:999px;
  font-family:inherit; font-weight:900;
  transition: transform 0.1s cubic-bezier(.34,1.56,.64,1), box-shadow 0.1s;
  -webkit-tap-highlight-color:transparent;
  padding:22px 0;
  width:240px;
  font-size:28px;
  background:linear-gradient(145deg,#ff4d6d,#c9184a);
  color:white;
  box-shadow:0 6px 24px rgba(201,24,74,0.6), 0 4px 0 #7b0d29;
  letter-spacing:2px;
}
#swingBtn:active { transform:scale(0.91); box-shadow:0 2px 8px rgba(201,24,74,0.4); }
#swingBtn.disabled { opacity:0.35; pointer-events:none; }

#homeBtn {
  position:fixed; top:16px; left:16px;
  pointer-events:all;
  background:rgba(255,255,255,0.18);
  border:2px solid rgba(255,255,255,0.3);
  color:white; font-size:14px; font-weight:900;
  padding:8px 14px; border-radius:999px;
  cursor:pointer; font-family:inherit;
  backdrop-filter:blur(4px);
  z-index:30;
}
#homeBtn:active { transform:scale(0.9); }

#scoreDisplay {
  position:fixed; top:16px; right:16px;
  pointer-events:none; z-index:30;
  background:rgba(0,0,0,0.45);
  border:2px solid rgba(255,255,255,0.2);
  border-radius:16px;
  padding:8px 14px;
  color:white; font-size:13px; font-weight:900;
  text-align:center;
  backdrop-filter:blur(4px);
}
#scoreDisplay .big { font-size:22px; display:block; }

#readyMsg {
  position:fixed; top:28%; left:50%; transform:translate(-50%,-50%);
  font-size:38px; font-weight:900; color:white;
  text-shadow:0 3px 12px rgba(0,0,0,0.8);
  pointer-events:none; z-index:25;
  opacity:0; transition:opacity 0.4s;
  text-align:center;
}
#readyMsg.show { opacity:1; }

#pitchTypeMsg {
  position:fixed; top:18%; left:50%; transform:translate(-50%,-50%);
  font-size:22px; font-weight:900;
  pointer-events:none; z-index:25;
  opacity:0; transition:opacity 0.3s;
  text-align:center;
  background:rgba(0,0,0,0.5);
  border-radius:20px;
  padding:8px 20px;
}
#pitchTypeMsg.show { opacity:1; }

#particleCanvas {
  position:fixed; top:0; left:0; width:100%; height:100dvh;
  pointer-events:none; z-index:15;
}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<div id="result"></div>
<div id="readyMsg">⚾ じゅんびして！</div>
<div id="pitchTypeMsg"></div>

<button id="homeBtn">🏠 もどる</button>

<div id="scoreDisplay">
  <span class="big" id="hitCount">0</span>
  ヒット
</div>

<div id="ui">
  <button id="swingBtn" class="disabled">🏏 ふる！</button>
</div>

<script>
// ─── Canvas setup ────────────────────────────────────────────────
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const pCanvas = document.getElementById('particleCanvas');
const pCtx    = pCanvas.getContext('2d');

function resize() {
  canvas.width = pCanvas.width = window.innerWidth;
  canvas.height = pCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── State ───────────────────────────────────────────────────────
const STATE = { IDLE:0, READY:1, PITCHING:2, RESULT:3 };
let state         = STATE.IDLE;
let ballProgress  = -1;   // -1 = hidden; 0..1 = in flight
let pitchStart    = 0;
let pitchDuration = 1300;
let isStrike      = true;
let pitchOffsetX  = 0;    // lateral drift (px at arrival)
let pitchType     = 'normal';
let swungDuringPitch = false;
let swingProgress    = 0; // ballProgress at moment of swing
let particles     = [];
let hitCount      = 0;
let flyBallAnim   = null;
let batterSwing   = false;
let batterSwingT  = 0;

// ─── Scene ───────────────────────────────────────────────────────
function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  drawField(W, H);
  drawStrikeZone(W, H);
  drawPitcher(W, H);
  drawBatter(W, H);
  if (ballProgress >= 0 && state === STATE.PITCHING) drawBall(W, H);
  if (flyBallAnim) drawFlyBall(W, H);
}

// ── Field (catcher view: looking toward pitcher) ─────────────────
function drawField(W, H) {
  const hY = H * 0.40; // horizon

  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, hY);
  sky.addColorStop(0, '#1a4a8a'); sky.addColorStop(1, '#3a7abf');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, hY);

  // Stands (arc behind pitcher)
  const standGrad = ctx.createLinearGradient(0, 0, 0, hY);
  standGrad.addColorStop(0, '#1a2a7a'); standGrad.addColorStop(1, '#2a3a99');
  ctx.fillStyle = standGrad;
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(W,0); ctx.lineTo(W, hY*0.82); ctx.lineTo(0, hY*0.82);
  ctx.fill();

  // Crowd dots
  ctx.fillStyle = 'rgba(255,200,100,0.28)';
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 32; col++) {
      ctx.beginPath();
      ctx.arc(col*(W/31)+(row%2)*9, row*(hY*0.13)+6, 3, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Scoreboard
  ctx.fillStyle = '#0d1144';
  ctx.fillRect(W*0.36, hY*0.04, W*0.28, hY*0.38);
  ctx.fillStyle = '#ffdd00';
  ctx.font = `bold ${Math.floor(W*0.024)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('BALL PARK', W*0.5, hY*0.2);
  ctx.fillStyle = '#ff5555';
  ctx.fillText('⚾ あそぼう！', W*0.5, hY*0.35);

  // Outfield wall
  ctx.fillStyle = '#1e3a1a';
  ctx.fillRect(0, hY*0.8, W, hY*0.2);

  // Outfield grass
  const grassGrad = ctx.createLinearGradient(0, hY, 0, H);
  grassGrad.addColorStop(0, '#267026'); grassGrad.addColorStop(0.4, '#3a9a3a'); grassGrad.addColorStop(1, '#267a26');
  ctx.fillStyle = grassGrad;
  ctx.beginPath();
  ctx.moveTo(0, hY); ctx.lineTo(W, hY); ctx.lineTo(W, H); ctx.lineTo(0, H);
  ctx.fill();

  // Grass stripe pattern
  for (let i = 0; i < 7; i++) {
    const y0 = hY + (H - hY) * (i / 7);
    const y1 = hY + (H - hY) * ((i + 0.5) / 7);
    ctx.fillStyle = i%2===0 ? 'rgba(80,180,80,0.12)' : 'rgba(20,80,20,0.12)';
    ctx.fillRect(0, y0, W, y1 - y0);
  }

  // Infield dirt path (trapezoid, narrow at pitcher → wide at plate)
  const dirtGrad = ctx.createLinearGradient(0, hY, 0, H*0.9);
  dirtGrad.addColorStop(0, '#7a4a20'); dirtGrad.addColorStop(1, '#c8874a');
  ctx.fillStyle = dirtGrad;
  ctx.beginPath();
  ctx.moveTo(W*0.475, hY + (H-hY)*0.07);
  ctx.lineTo(W*0.525, hY + (H-hY)*0.07);
  ctx.lineTo(W*0.70,  H*0.88);
  ctx.lineTo(W*0.30,  H*0.88);
  ctx.closePath();
  ctx.fill();

  // Pitcher's mound
  ctx.fillStyle = '#a06428';
  ctx.beginPath();
  ctx.ellipse(W*0.5, hY + (H-hY)*0.12, W*0.028, (H-hY)*0.022, 0, 0, Math.PI*2);
  ctx.fill();

  // 2nd base (deep center)
  ctx.fillStyle = 'white';
  ctx.fillRect(W*0.497, hY+(H-hY)*0.04, 6, 5);

  // 1st base (right, middle distance)
  ctx.save(); ctx.translate(W*0.66, hY+(H-hY)*0.28);
  ctx.fillStyle='white'; ctx.fillRect(-7,-5,14,10); ctx.restore();

  // 3rd base (left, middle distance)
  ctx.save(); ctx.translate(W*0.34, hY+(H-hY)*0.28);
  ctx.fillStyle='white'; ctx.fillRect(-7,-5,14,10); ctx.restore();

  // Foul lines
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W*0.5, H*0.89); ctx.lineTo(W*0.04, hY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.5, H*0.89); ctx.lineTo(W*0.96, hY); ctx.stroke();

  // Home plate
  ctx.fillStyle = 'white';
  ctx.save();
  ctx.translate(W*0.5, H*0.895);
  ctx.beginPath();
  ctx.moveTo(0, -14); ctx.lineTo(18, -5); ctx.lineTo(18, 9);
  ctx.lineTo(-18, 9); ctx.lineTo(-18, -5);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ── Strike zone (yellow dashed rectangle) ───────────────────────
function drawStrikeZone(W, H) {
  const zW = W * 0.19;
  const zH = H * 0.19;
  const zX = W * 0.5 - zW / 2;
  const zY = H * 0.50 - zH / 2;

  // Glow
  ctx.shadowColor = 'rgba(255,255,80,0.5)';
  ctx.shadowBlur = 8;
  ctx.strokeStyle = 'rgba(255,255,80,0.65)';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([9, 5]);
  ctx.strokeRect(zX, zY, zW, zH);
  ctx.setLineDash([]);
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(255,255,80,0.55)';
  ctx.font = `bold ${Math.floor(W*0.023)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('ストライク', W*0.5, zY - 7);
}

// ── Pitcher figure ───────────────────────────────────────────────
function drawPitcher(W, H) {
  const hY = H * 0.40;
  const px = W * 0.5;
  const py = hY + (H - hY) * 0.12;
  const s  = W * 0.022;
  const wind = (state === STATE.PITCHING && ballProgress < 0.18) ? ballProgress / 0.18 : 0;

  // Body
  ctx.fillStyle = '#cc2222';
  ctx.beginPath(); ctx.ellipse(px, py, s*0.45, s*0.62, 0, 0, Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle = '#fdbcb4';
  ctx.beginPath(); ctx.arc(px, py - s*0.82, s*0.35, 0, Math.PI*2); ctx.fill();
  // Cap
  ctx.fillStyle = '#1a1a6e';
  ctx.beginPath(); ctx.arc(px, py - s*0.95, s*0.36, Math.PI, Math.PI*2); ctx.fill();
  ctx.fillRect(px - s*0.48, py - s*1.04, s*0.96, s*0.12);
  // Arm wind-up
  ctx.strokeStyle = '#fdbcb4'; ctx.lineWidth = s*0.3; ctx.lineCap = 'round';
  const armAngle = -Math.PI/2 - wind * Math.PI * 0.9;
  ctx.beginPath();
  ctx.moveTo(px, py - s*0.2);
  ctx.lineTo(px + Math.cos(armAngle)*s*1.1, py + Math.sin(armAngle)*s*1.1);
  ctx.stroke();
}

// ── Ball (perspective: grows as it approaches) ───────────────────
function drawBall(W, H) {
  const hY = H * 0.40;
  const pitcherY = hY + (H - hY) * 0.12;  // where ball originates
  const arrivalY = H * 0.68;               // where ball reaches plate
  const p  = ballProgress;

  // Perspective: x/y/radius
  const bx = W * 0.5 + pitchOffsetX * p * p;
  const by = pitcherY + (arrivalY - pitcherY) * p;
  const br = 3 + p * p * 20;  // quadratic growth (perspective)

  // Ground shadow
  const gndY = hY + (H * 0.84 - hY) * p;
  ctx.fillStyle = 'rgba(0,0,0,0.22)';
  ctx.beginPath();
  ctx.ellipse(W*0.5 + pitchOffsetX*p*p, gndY, br*1.6, br*0.38, 0, 0, Math.PI*2);
  ctx.fill();

  // Ball gradient
  const bg = ctx.createRadialGradient(bx - br*0.32, by - br*0.32, br*0.08, bx, by, br);
  bg.addColorStop(0, '#ffffff'); bg.addColorStop(1, '#d8d8d8');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();

  // Seams
  ctx.strokeStyle = '#cc3333';
  ctx.lineWidth = Math.max(0.8, br * 0.16);
  ctx.beginPath(); ctx.arc(bx - br*0.28, by, br*0.68, -0.55, 0.55); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx + br*0.28, by, br*0.68, Math.PI-0.55, Math.PI+0.55); ctx.stroke();
}

// ── Batter (profile, right side) ────────────────────────────────
function drawBatter(W, H) {
  // Right-handed batter standing to the right, facing left (toward pitcher)
  const bx   = W * 0.80;
  const feet = H * 0.86;
  const s    = H * 0.19;
  const sw   = batterSwing ? Math.min(1, batterSwingT) : 0;

  // --- Legs ---
  ctx.strokeStyle = '#1a1a6e'; ctx.lineWidth = s*0.11; ctx.lineCap = 'round';
  // back leg
  ctx.beginPath(); ctx.moveTo(bx - s*0.05, feet); ctx.lineTo(bx - s*0.02, feet - s*0.42); ctx.stroke();
  // front leg (slightly bent forward)
  ctx.beginPath(); ctx.moveTo(bx - s*0.22, feet); ctx.lineTo(bx - s*0.14, feet - s*0.44); ctx.stroke();

  // --- Body ---
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.ellipse(bx - s*0.12, feet - s*0.63, s*0.13, s*0.22, -0.12, 0, Math.PI*2);
  ctx.fill();

  // --- Head ---
  ctx.fillStyle = '#fdbcb4';
  ctx.beginPath(); ctx.arc(bx - s*0.16, feet - s*0.94, s*0.13, 0, Math.PI*2); ctx.fill();

  // --- Helmet ---
  ctx.fillStyle = '#1a1a6e';
  ctx.beginPath(); ctx.arc(bx - s*0.16, feet - s*1.02, s*0.145, Math.PI*0.75, Math.PI*2.25); ctx.fill();
  // brim
  ctx.fillRect(bx - s*0.34, feet - s*1.08, s*0.35, s*0.08);
  // ear flap
  ctx.beginPath(); ctx.arc(bx - s*0.03, feet - s*0.92, s*0.08, 0, Math.PI*2); ctx.fill();

  // --- Bat ---
  // At rest: raised behind right shoulder (pointing upper-right)
  // Swing: sweeps forward (pointing lower-left) - dramatic arc

  // sw=0 → rest angle; sw=1 → follow-through
  const restAngle   = -Math.PI * 0.28;  // pointing upper-right
  const contactAngle = Math.PI * 0.18;  // nearly horizontal through zone
  const followAngle  = Math.PI * 0.68;  // pointing lower-left follow-through

  let batAngle;
  if (sw < 0.55) {
    batAngle = restAngle + (contactAngle - restAngle) * (sw / 0.55);
  } else {
    batAngle = contactAngle + (followAngle - contactAngle) * ((sw - 0.55) / 0.45);
  }

  const batLen     = s * 0.90;
  const gripX      = bx - s * 0.06;
  const gripY      = feet - s * 0.70;

  // Motion trail (before contact)
  if (sw > 0.05 && sw < 0.6) {
    for (let m = 1; m <= 4; m++) {
      ctx.save();
      ctx.translate(gripX, gripY);
      const trailAngle = batAngle - m * 0.18;
      ctx.rotate(trailAngle);
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = '#8B4513';
      const tw = s * 0.025;
      ctx.beginPath();
      ctx.moveTo(-tw*0.4, 0); ctx.lineTo(tw*0.4, 0);
      ctx.lineTo(tw*0.55, -batLen); ctx.lineTo(-tw*0.55, -batLen);
      ctx.closePath(); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // Bat body
  ctx.save();
  ctx.translate(gripX, gripY);
  ctx.rotate(batAngle);

  // Grip tape
  ctx.fillStyle = '#3a1800';
  ctx.fillRect(-s*0.022, -s*0.08, s*0.044, s*0.08);

  // Shaft
  ctx.fillStyle = '#8B4513';
  const bw = s * 0.024;
  ctx.beginPath();
  ctx.moveTo(-bw*0.45, 0);
  ctx.lineTo(bw*0.45, 0);
  ctx.lineTo(bw*0.6, -batLen);
  ctx.lineTo(-bw*0.6, -batLen);
  ctx.closePath(); ctx.fill();

  // Barrel
  ctx.fillStyle = '#a0522d';
  ctx.beginPath();
  ctx.ellipse(0, -batLen, s*0.055, s*0.04, 0, 0, Math.PI*2);
  ctx.fill();

  // Highlight on barrel
  ctx.fillStyle = 'rgba(255,220,180,0.4)';
  ctx.beginPath();
  ctx.ellipse(-s*0.015, -batLen - s*0.005, s*0.022, s*0.014, -0.4, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();

  // WHOOSH arc during swing
  if (sw > 0.1 && sw < 0.75) {
    const arcT = (sw - 0.1) / 0.65;
    ctx.save();
    ctx.translate(gripX, gripY - batLen * 0.85);
    ctx.strokeStyle = 'rgba(200,230,255,0.45)';
    ctx.lineWidth = 3;
    const startA = restAngle - Math.PI/2;
    const endA   = batAngle  - Math.PI/2;
    ctx.beginPath();
    ctx.arc(0, 0, batLen * 0.82, startA, endA);
    ctx.stroke();
    ctx.restore();
  }
}

// ── Fly ball after hit ───────────────────────────────────────────
function drawFlyBall(W, H) {
  if (!flyBallAnim) return;
  const p  = flyBallAnim.progress;
  const bx = flyBallAnim.x + (flyBallAnim.tx - flyBallAnim.x) * p;
  const by = flyBallAnim.y + (flyBallAnim.ty - flyBallAnim.y) * p - Math.sin(p * Math.PI) * H * 0.32;
  const r  = 12 + (1 - p) * 5;

  ctx.fillStyle = 'white';
  ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#cc3333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(bx - r*0.28, by, r*0.66, -0.5, 0.5); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx + r*0.28, by, r*0.66, Math.PI-0.5, Math.PI+0.5); ctx.stroke();
}

// ─── Timing judgment ─────────────────────────────────────────────
// Sweet spot: ball is in the strike zone area (progress ~0.80–0.98)
function getTimingScore(progress) {
  const center     = 0.88;
  const halfWindow = 0.13;
  const dist = Math.abs(progress - center);
  if (dist > halfWindow * 2.4) return 0;
  return Math.max(0, 1 - dist / halfWindow);
}

function judgeResult(didSwing, progress, strikeZone) {
  if (!didSwing) {
    return strikeZone
      ? { text:'みのがし…', sub:'ストライク！', color:'#ffcc00', type:'strike' }
      : { text:'ボール！',   sub:'よけた！',     color:'#44aaff', type:'ball'   };
  }
  const score = getTimingScore(progress);
  if (score >= 0.84) {
    return { text:'ホームラン！！', sub:'🎆 かんぺき！',   color:'#ff4400', type:'homerun' };
  } else if (score >= 0.52) {
    return Math.random() < 0.55
      ? { text:'ヒット！',  sub:'⚾ うまい！',   color:'#ffdd00', type:'hit' }
      : { text:'ぼんだ！',  sub:'フライボール', color:'#88ff44', type:'fly' };
  } else if (score >= 0.18) {
    return { text:'ファール',   sub:'おしい…',  color:'#ff8844', type:'foul' };
  } else {
    return { text:'からぶり！', sub:'ミス…',    color:'#ff44aa', type:'miss' };
  }
}

// ─── Particles ───────────────────────────────────────────────────
function spawnParticles(x, y, color, count, type) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 4 + Math.random() * (type === 'homerun' ? 14 : 7);
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - (type === 'homerun' ? 8 : 3),
      life: 1, decay: 0.017 + Math.random() * 0.02,
      size: 4 + Math.random() * (type === 'homerun' ? 10 : 6),
      color: type === 'homerun'
        ? ['#ff4400','#ffdd00','#ff88ff','#00eeff'][Math.floor(Math.random()*4)]
        : color
    });
  }
}

function updateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.38; p.life -= p.decay;
    pCtx.globalAlpha = Math.max(0, p.life);
    pCtx.fillStyle = p.color;
    pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); pCtx.fill();
  });
  pCtx.globalAlpha = 1;
}

// ─── Game loop ───────────────────────────────────────────────────
let lastTime = 0;
function loop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  if (state === STATE.PITCHING) {
    const elapsed = ts - pitchStart;
    ballProgress = Math.min(1, elapsed / pitchDuration);

    if (batterSwing) batterSwingT += dt / 145;

    drawScene();

    // Ball passed plate without swing → judge as missed/ball
    if (ballProgress >= 1 && !swungDuringPitch) {
      finishPitch(false, 1.0);
    }

  } else {
    drawScene();
    if (batterSwing) {
      batterSwingT += dt / 145;
      if (batterSwingT > 1.8) { batterSwing = false; batterSwingT = 0; }
    }
  }

  if (flyBallAnim) {
    flyBallAnim.progress += dt / 1500;
    if (flyBallAnim.progress >= 1) flyBallAnim = null;
  }

  updateParticles();
  requestAnimationFrame(loop);
}

// ─── Pitch logic ─────────────────────────────────────────────────
function showReady() {
  if (state !== STATE.IDLE) return;
  state = STATE.READY;
  document.getElementById('swingBtn').classList.add('disabled');

  const rm = document.getElementById('readyMsg');
  rm.textContent = '⚾ じゅんびして！';
  rm.classList.add('show');

  setTimeout(() => {
    // Decide pitch type so we can hint it
    isStrike      = Math.random() < 0.72;
    pitchType     = Math.random() < 0.35 ? 'fast' : (Math.random() < 0.5 ? 'slow' : 'normal');
    pitchDuration = pitchType === 'fast' ? 920 : (pitchType === 'slow' ? 1850 : 1280);

    if (isStrike) {
      pitchOffsetX = (Math.random() - 0.5) * canvas.width * 0.055;
    } else {
      pitchOffsetX = (Math.random() > 0.5 ? 1 : -1) * canvas.width * (0.14 + Math.random()*0.06);
    }

    const label = pitchType === 'fast' ? '🔥 はやいたまだ！' : (pitchType === 'slow' ? '🌀 ゆっくりくるよ…' : '⚾ いくよ！');
    rm.textContent = label;

    setTimeout(() => {
      rm.classList.remove('show');
      startPitch();
    }, 950);
  }, 1050);
}

function startPitch() {
  if (state !== STATE.READY) return;
  state            = STATE.PITCHING;
  pitchStart       = performance.now();
  ballProgress     = 0;
  swungDuringPitch = false;
  batterSwing      = false;
  batterSwingT     = 0;

  document.getElementById('swingBtn').classList.remove('disabled');
}

function swing() {
  if (state !== STATE.PITCHING || swungDuringPitch) return;
  const captured = ballProgress;   // capture timing at this exact frame
  swungDuringPitch = true;
  batterSwing      = true;
  batterSwingT     = 0;
  document.getElementById('swingBtn').classList.add('disabled');
  finishPitch(true, captured);
}

function finishPitch(didSwing, progress) {
  state        = STATE.RESULT;
  ballProgress = -1;  // hide ball

  const result = judgeResult(didSwing, progress, isStrike);
  showResult(result);

  if (result.type === 'hit' || result.type === 'homerun' || result.type === 'fly') {
    hitCount++;
    document.getElementById('hitCount').textContent = hitCount;
    launchFlyBall(result.type === 'homerun');
  }

  const W = canvas.width, H = canvas.height;
  const cx = W * 0.5, cy = H * 0.58;
  if (result.type === 'homerun')                             spawnParticles(cx, cy, result.color, 80, 'homerun');
  else if (result.type === 'hit' || result.type === 'fly')   spawnParticles(cx, cy, result.color, 40, 'hit');
  else if (result.type === 'miss' || result.type === 'strike') spawnParticles(cx, cy, '#8888aa', 18, 'miss');

  setTimeout(() => {
    state        = STATE.IDLE;
    batterSwing  = false;
    batterSwingT = 0;
    setTimeout(showReady, 700);  // auto-pitch next ball
  }, 2100);
}

function launchFlyBall(homerun) {
  const W = canvas.width, H = canvas.height;
  flyBallAnim = {
    x: W * 0.5, y: H * 0.60,
    tx: homerun ? W * 0.5 : W * (0.22 + Math.random() * 0.56),
    ty: homerun ? H * 0.04 : H * (0.12 + Math.random() * 0.22),
    progress: 0
  };
}

function showResult(result) {
  const el = document.getElementById('result');
  el.style.color = result.color;
  el.innerHTML   = result.text + (result.sub
    ? `<br><span style="font-size:26px;opacity:0.88">${result.sub}</span>` : '');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  el.addEventListener('animationend', () => el.classList.remove('show'), { once: true });
}

// ─── Events ──────────────────────────────────────────────────────
document.getElementById('swingBtn').addEventListener('click', swing);
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (state === STATE.PITCHING) swing();
  }
});
document.getElementById('homeBtn').addEventListener('click', () => { location.href = './index.html'; });

// ─── Boot ─────────────────────────────────────────────────────────
requestAnimationFrame(loop);
setTimeout(showReady, 600);
</script>
</body>
