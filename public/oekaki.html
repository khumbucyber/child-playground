<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎨 おえかき</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', 'Kosugi Maru', sans-serif;
  touch-action: manipulation;
}

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  background: #fff;
}

/* ── Header ── */
#header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  padding-top: max(8px, env(safe-area-inset-top));
  background: linear-gradient(90deg, #ff4757, #ff6b81, #ffa502, #ffdd59, #7bed9f, #2ed573, #1e90ff, #5352ed, #a29bfe, #fd79a8);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

#header-title {
  font-size: 20px;
  font-weight: 900;
  color: white;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  letter-spacing: 1px;
}

#btn-back {
  background: rgba(255,255,255,0.9);
  border: none;
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 900;
  color: #5352ed;
  cursor: pointer;
  min-height: 44px;
  font-family: inherit;
  touch-action: manipulation;
}

/* ── Canvas ── */
#canvas-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: #fff;
}

#canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
  cursor: crosshair;
}

/* ── Palette ── */
#palette-wrap {
  flex-shrink: 0;
  height: 64px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  background: #f8f8f8;
  border-top: 1px solid #eee;
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 8px;
}
#palette-wrap::-webkit-scrollbar { display: none; }

.color-btn {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  outline: none;
  transition: transform 0.15s;
  touch-action: manipulation;
  position: relative;
}
.color-btn.selected {
  outline: 3px solid #333;
  outline-offset: 2px;
  transform: scale(1.15);
}
.color-btn:active { transform: scale(0.9); }

/* ── Controls ── */
#controls {
  flex-shrink: 0;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  background: #f0f0f0;
  border-top: 1px solid #ddd;
  gap: 8px;
}

.brush-btn {
  background: white;
  border: 2px solid #ddd;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 52px;
  height: 44px;
  cursor: pointer;
  touch-action: manipulation;
  transition: all 0.15s;
}
.brush-btn.selected {
  border-color: #5352ed;
  background: #ede9ff;
}
.brush-btn:active { transform: scale(0.9); }

.brush-dot {
  background: #333;
  border-radius: 50%;
  display: block;
}

.action-btn {
  background: white;
  border: 2px solid #ddd;
  border-radius: 12px;
  padding: 0 12px;
  height: 44px;
  font-size: 14px;
  font-weight: 900;
  color: #444;
  cursor: pointer;
  touch-action: manipulation;
  font-family: inherit;
  transition: all 0.15s;
  white-space: nowrap;
}
.action-btn:active { transform: scale(0.9); }

#btn-undo { color: #ff7675; }
#btn-clear { color: #e84393; }

/* ── Confetti ── */
#confetti-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 100;
  overflow: hidden;
}

.confetti-piece {
  position: absolute;
  top: -20px;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  animation: confettiFall 0.8s ease-in forwards;
}

@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ── Clear flash ── */
#clear-flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 99;
  transition: opacity 0.1s;
}
#clear-flash.show {
  opacity: 0.8;
  transition: none;
}
</style>
</head>
<body>

<div id="header">
  <div id="header-title">🎨 おえかき</div>
  <button id="btn-back" onclick="location.href='./index.html'">もどる</button>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div id="palette-wrap" id="palette"></div>

<div id="controls">
  <div style="display:flex;gap:6px;align-items:center;">
    <button class="brush-btn selected" data-size="4" id="brush-thin">
      <span class="brush-dot" style="width:4px;height:4px;"></span>
    </button>
    <button class="brush-btn" data-size="12" id="brush-mid">
      <span class="brush-dot" style="width:12px;height:12px;"></span>
    </button>
    <button class="brush-btn" data-size="28" id="brush-thick">
      <span class="brush-dot" style="width:24px;height:24px;"></span>
    </button>
  </div>
  <div style="display:flex;gap:6px;align-items:center;">
    <button class="action-btn" id="btn-undo">↩ もどす</button>
    <button class="action-btn" id="btn-clear">🗑 きれいに</button>
  </div>
</div>

<div id="confetti-container"></div>
<div id="clear-flash"></div>

<script>
// ── Canvas setup ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

let dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);
  // redraw from history on resize would be complex; just clear
  undoStack = [];
  updateUndoBtn();
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── State ──
let currentColor = '#ff4757';
let brushSize = 4;
let isDrawing = false;
let activePointerId = null;
let undoStack = [];  // array of ImageData
const MAX_UNDO = 30;

// ── Color palette ──
const COLORS = [
  '#ff4757','#ff6b81','#ffa502','#ffdd59','#7bed9f',
  '#2ed573','#1e90ff','#5352ed','#a29bfe','#fd79a8',
  '#2d3436','#ffffff'
];

const paletteWrap = document.getElementById('palette-wrap');
COLORS.forEach(color => {
  const btn = document.createElement('button');
  btn.className = 'color-btn' + (color === currentColor ? ' selected' : '');
  btn.title = color;
  // Sphere gradient
  btn.style.background = `radial-gradient(circle at 35% 35%, ${lighten(color, 40)}, ${color} 60%, ${darken(color, 20)})`;
  if (color === '#ffffff') {
    btn.style.border = '3px solid #ccc';
  }
  btn.addEventListener('pointerdown', e => {
    e.preventDefault();
    selectColor(color, btn);
  });
  paletteWrap.appendChild(btn);
});

function lighten(hex, amount) {
  return shiftColor(hex, amount);
}
function darken(hex, amount) {
  return shiftColor(hex, -amount);
}
function shiftColor(hex, amount) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const clamp = v => Math.max(0, Math.min(255, v));
  return `rgb(${clamp(r+amount)},${clamp(g+amount)},${clamp(b+amount)})`;
}

function selectColor(color, btn) {
  currentColor = color;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

// ── Brush size ──
document.querySelectorAll('.brush-btn').forEach(btn => {
  btn.addEventListener('pointerdown', e => {
    e.preventDefault();
    brushSize = parseInt(btn.dataset.size);
    document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

// ── Drawing ──
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function saveForUndo() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  undoStack.push(data);
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  updateUndoBtn();
}

canvas.addEventListener('pointerdown', e => {
  if (activePointerId !== null) return; // ignore second finger
  activePointerId = e.pointerId;
  canvas.setPointerCapture(e.pointerId);
  saveForUndo();
  isDrawing = true;
  const pos = getPos(e);
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, brushSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = currentColor;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
  ctx.strokeStyle = currentColor;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
});

canvas.addEventListener('pointermove', e => {
  if (!isDrawing || e.pointerId !== activePointerId) return;
  const pos = getPos(e);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
});

canvas.addEventListener('pointerup', e => {
  if (e.pointerId !== activePointerId) return;
  isDrawing = false;
  activePointerId = null;
  ctx.beginPath();
});

canvas.addEventListener('pointercancel', e => {
  if (e.pointerId !== activePointerId) return;
  isDrawing = false;
  activePointerId = null;
  ctx.beginPath();
});

// prevent scroll while drawing
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });

// ── Undo ──
function updateUndoBtn() {
  document.getElementById('btn-undo').style.opacity = undoStack.length > 0 ? '1' : '0.4';
}
updateUndoBtn();

document.getElementById('btn-undo').addEventListener('click', () => {
  if (undoStack.length === 0) return;
  const data = undoStack.pop();
  ctx.putImageData(data, 0, 0);
  updateUndoBtn();
});

// ── Clear ──
document.getElementById('btn-clear').addEventListener('click', () => {
  saveForUndo();
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);
  launchConfetti();
  flashClear();
});

function flashClear() {
  const el = document.getElementById('clear-flash');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 100);
}

function launchConfetti() {
  const container = document.getElementById('confetti-container');
  const colors = ['#ff4757','#ffa502','#ffdd59','#7bed9f','#1e90ff','#a29bfe','#fd79a8'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDelay = (Math.random() * 0.4) + 's';
    piece.style.animationDuration = (0.6 + Math.random() * 0.4) + 's';
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 1200);
  }
}
</script>
</body>
</html>
