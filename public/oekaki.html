<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎨 おえかき</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', 'Kosugi Maru', sans-serif;
}

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  background: #fff;
  touch-action: none; /* キャンバス全体でスクロール防止 */
}

/* ── Header ── */
#header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  padding-top: max(8px, env(safe-area-inset-top));
  background: linear-gradient(90deg, #ff4757, #ff6b81, #ffa502, #ffdd59, #7bed9f, #2ed573, #1e90ff, #5352ed, #a29bfe, #fd79a8);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  touch-action: manipulation;
}

#header-title {
  font-size: 20px;
  font-weight: 900;
  color: white;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  letter-spacing: 1px;
}

#btn-back {
  background: rgba(255,255,255,0.9);
  border: none;
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 900;
  color: #5352ed;
  cursor: pointer;
  min-height: 44px;
  font-family: inherit;
  touch-action: manipulation;
}

/* ── Canvas ── */
#canvas-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: #fff;
}

#canvas {
  display: block;
  touch-action: none;
  cursor: crosshair;
}

/* ── Palette ── */
#palette-wrap {
  flex-shrink: 0;
  height: 64px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  background: #f8f8f8;
  border-top: 1px solid #eee;
  display: flex;
  align-items: center;
  padding: 0 8px;
  gap: 8px;
  touch-action: pan-x; /* 横スクロールのみ許可 */
}
#palette-wrap::-webkit-scrollbar { display: none; }

.color-btn {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 3px solid transparent;
  cursor: pointer;
  outline: none;
  touch-action: manipulation;
  position: relative;
}
.color-btn.selected {
  outline: 3px solid #333;
  outline-offset: 2px;
  transform: scale(1.15);
}

/* ── Controls ── */
#controls {
  flex-shrink: 0;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  background: #f0f0f0;
  border-top: 1px solid #ddd;
  gap: 8px;
  touch-action: manipulation;
}

.brush-btn {
  background: white;
  border: 2px solid #ddd;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 48px;
  cursor: pointer;
  touch-action: manipulation;
  transition: all 0.15s;
}
.brush-btn.selected {
  border-color: #5352ed;
  background: #ede9ff;
}

.brush-dot {
  background: #333;
  border-radius: 50%;
  display: block;
}

.action-btn {
  background: white;
  border: 2px solid #ddd;
  border-radius: 12px;
  padding: 0 14px;
  height: 48px;
  font-size: 15px;
  font-weight: 900;
  color: #444;
  cursor: pointer;
  touch-action: manipulation;
  font-family: inherit;
  white-space: nowrap;
}

#btn-undo { color: #ff7675; }
#btn-clear { color: #e84393; }

/* ── Confetti ── */
#confetti-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 100;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  top: -20px;
  border-radius: 2px;
  animation: confettiFall 0.8s ease-in forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* ── Clear flash ── */
#clear-flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 99;
}
</style>
</head>
<body>

<div id="header">
  <div id="header-title">🎨 おえかき</div>
  <button id="btn-back" onclick="location.href='./index.html'">もどる</button>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div id="palette-wrap"></div>

<div id="controls">
  <div style="display:flex;gap:6px;align-items:center;">
    <button class="brush-btn selected" id="brush-thin" data-size="4">
      <span class="brush-dot" style="width:5px;height:5px;"></span>
    </button>
    <button class="brush-btn" id="brush-mid" data-size="12">
      <span class="brush-dot" style="width:13px;height:13px;"></span>
    </button>
    <button class="brush-btn" id="brush-thick" data-size="28">
      <span class="brush-dot" style="width:24px;height:24px;"></span>
    </button>
  </div>
  <div style="display:flex;gap:6px;align-items:center;">
    <button class="action-btn" id="btn-undo">↩ もどす</button>
    <button class="action-btn" id="btn-clear">🗑 きれいに</button>
  </div>
</div>

<div id="confetti-container"></div>
<div id="clear-flash"></div>

<script>
// ── Canvas setup ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvas-wrap');

const dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  // キャンバス内容を退避
  let saved = null;
  if (canvas.width > 0 && canvas.height > 0) {
    try { saved = ctx.getImageData(0, 0, canvas.width, canvas.height); } catch(e) {}
  }
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  // スケールを設定（毎回リセットしてから）
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);
  if (saved) ctx.putImageData(saved, 0, 0);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── State ──
let currentColor = '#ff4757';
let brushSize = 4;
let isDrawing = false;
let activePointerId = null;
let undoStack = [];
const MAX_UNDO = 30;

// ── Color palette ──
const COLORS = [
  '#ff4757','#ff6b81','#ffa502','#ffdd59','#7bed9f',
  '#2ed573','#1e90ff','#5352ed','#a29bfe','#fd79a8',
  '#2d3436','#ffffff'
];

function shiftColor(hex, amt) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const c = v => Math.max(0, Math.min(255, v + amt));
  return `rgb(${c(r)},${c(g)},${c(b)})`;
}

const paletteWrap = document.getElementById('palette-wrap');
COLORS.forEach(color => {
  const btn = document.createElement('button');
  btn.className = 'color-btn' + (color === currentColor ? ' selected' : '');
  btn.style.background = `radial-gradient(circle at 35% 35%, ${shiftColor(color,50)}, ${color} 60%, ${shiftColor(color,-30)})`;
  if (color === '#ffffff') btn.style.border = '3px solid #bbb';
  // click を使う（pointerdown + preventDefault はスクロールと競合する可能性あり）
  btn.addEventListener('click', () => {
    currentColor = color;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
  paletteWrap.appendChild(btn);
});

// ── Brush size ──
document.querySelectorAll('.brush-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    brushSize = parseInt(btn.dataset.size);
    document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

// ── Drawing ──
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left),
    y: (e.clientY - rect.top)
  };
}

function saveForUndo() {
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  undoStack.push(data);
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  updateUndoBtn();
}

canvas.addEventListener('pointerdown', e => {
  if (activePointerId !== null) return;
  e.preventDefault();
  activePointerId = e.pointerId;
  canvas.setPointerCapture(e.pointerId);
  saveForUndo();
  isDrawing = true;
  const pos = getPos(e);
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, brushSize / 2, 0, Math.PI * 2);
  ctx.fillStyle = currentColor;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
  ctx.strokeStyle = currentColor;
  ctx.lineWidth = brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}, { passive: false });

canvas.addEventListener('pointermove', e => {
  if (!isDrawing || e.pointerId !== activePointerId) return;
  e.preventDefault();
  const pos = getPos(e);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}, { passive: false });

canvas.addEventListener('pointerup', e => {
  if (e.pointerId !== activePointerId) return;
  isDrawing = false;
  activePointerId = null;
  ctx.beginPath();
});

canvas.addEventListener('pointercancel', e => {
  if (e.pointerId !== activePointerId) return;
  isDrawing = false;
  activePointerId = null;
  ctx.beginPath();
});

// ── Undo ──
function updateUndoBtn() {
  document.getElementById('btn-undo').style.opacity = undoStack.length > 0 ? '1' : '0.4';
}
updateUndoBtn();

document.getElementById('btn-undo').addEventListener('click', () => {
  if (undoStack.length === 0) return;
  const data = undoStack.pop();
  ctx.putImageData(data, 0, 0);
  updateUndoBtn();
});

// ── Clear ──
document.getElementById('btn-clear').addEventListener('click', () => {
  saveForUndo();
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);
  launchConfetti();
  // flash
  const fl = document.getElementById('clear-flash');
  fl.style.opacity = '0.8';
  setTimeout(() => { fl.style.transition = 'opacity 0.4s'; fl.style.opacity = '0'; }, 80);
  setTimeout(() => { fl.style.transition = ''; }, 500);
});

function launchConfetti() {
  const container = document.getElementById('confetti-container');
  const colors = ['#ff4757','#ffa502','#ffdd59','#7bed9f','#1e90ff','#a29bfe','#fd79a8'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.width  = (6 + Math.random() * 8) + 'px';
    p.style.height = (6 + Math.random() * 8) + 'px';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animationDelay    = (Math.random() * 0.4) + 's';
    p.style.animationDuration = (0.6 + Math.random() * 0.4) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}
</script>
</body>
</html>
