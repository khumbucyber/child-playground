<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>おりがみ 🦢</title>
<style>
:root {
  --ink: #2a1f4e;
  --bg: linear-gradient(180deg, #b8e8ff 0%, #d8f4ff 40%, #d4f5d0 100%);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
html, body { height:100%; font-family:'Hiragino Maru Gothic Pro','BIZ UDPGothic','Kosugi Maru',sans-serif; background:var(--bg); overflow:hidden; }

/* ── Screens ── */
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; overflow-y:auto; }
.screen.hidden { display:none; }

/* ── Back button ── */
.back-btn {
  position:absolute; top:12px; left:12px;
  background:rgba(255,255,255,0.85); border:none; border-radius:50px;
  padding:8px 16px; font-size:18px; cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.12); font-family:inherit;
}

/* ════════════════════════════════
   SELECT SCREEN
════════════════════════════════ */
#screen-select { justify-content:flex-start; padding:40px 16px 20px; }
#screen-select h1 { font-size:28px; font-weight:900; color:var(--ink); margin-bottom:6px; text-shadow:0 2px 0 rgba(255,255,255,0.9); }
#screen-select .subtitle { font-size:13px; color:#5a7a6a; font-weight:700; margin-bottom:24px; }

.item-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%; max-width:400px; }
.item-card {
  background:rgba(255,255,255,0.88); border-radius:20px;
  padding:18px 8px 14px; display:flex; flex-direction:column; align-items:center;
  cursor:pointer; border:3px solid transparent;
  box-shadow:0 6px 20px rgba(0,0,0,0.10);
  transition:transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s;
}
.item-card:active { transform:scale(0.93); }
.item-card:hover { transform:translateY(-4px) scale(1.04); box-shadow:0 12px 30px rgba(0,0,0,0.15); }
.item-card .emoji { font-size:48px; line-height:1; margin-bottom:8px; }
.item-card .label { font-size:13px; font-weight:900; color:var(--ink); text-align:center; }

/* ════════════════════════════════
   COLOR SCREEN
════════════════════════════════ */
#screen-color { justify-content:flex-start; padding:60px 16px 20px; }
#screen-color h2 { font-size:22px; font-weight:900; color:var(--ink); margin-bottom:6px; }
#screen-color .subtitle { font-size:13px; color:#5a7a6a; font-weight:700; margin-bottom:20px; }

.preview-paper {
  width:140px; height:140px; margin:0 auto 20px;
  border-radius:12px; box-shadow:0 6px 20px rgba(0,0,0,0.15);
  transition:background .2s;
  display:flex; align-items:center; justify-content:center;
  font-size:60px;
}

.color-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; width:100%; max-width:340px; margin-bottom:24px; }
.color-swatch {
  width:100%; aspect-ratio:1; border-radius:50%; cursor:pointer;
  border:4px solid transparent; box-shadow:0 3px 10px rgba(0,0,0,0.15);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1), border-color .15s;
}
.color-swatch:hover { transform:scale(1.12); }
.color-swatch.selected { border-color:#2a1f4e; transform:scale(1.18); }

.big-btn {
  background:#ff6b6b; color:white; border:none; border-radius:50px;
  padding:16px 40px; font-size:20px; font-weight:900;
  cursor:pointer; font-family:inherit;
  box-shadow:0 6px 20px rgba(255,107,107,0.45);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1);
}
.big-btn:active { transform:scale(0.93); }
.big-btn.green { background:#4caf50; box-shadow:0 6px 20px rgba(76,175,80,0.45); }
.big-btn.blue  { background:#2196f3; box-shadow:0 6px 20px rgba(33,150,243,0.45); }

/* ════════════════════════════════
   FOLD SCREEN
════════════════════════════════ */
#screen-fold { justify-content:flex-start; padding:0; }

.fold-header {
  width:100%; padding:12px 16px 8px;
  display:flex; align-items:center; justify-content:space-between;
  background:rgba(255,255,255,0.7); backdrop-filter:blur(8px);
}
.fold-title { font-size:18px; font-weight:900; color:var(--ink); }
.step-dots { display:flex; gap:6px; }
.step-dot { width:10px; height:10px; border-radius:50%; background:rgba(42,31,78,0.2); transition:background .3s; }
.step-dot.done { background:#4caf50; }
.step-dot.active { background:#ff6b6b; }

.fold-instruction {
  margin:10px 16px 0;
  background:rgba(255,255,255,0.88); border-radius:14px;
  padding:10px 16px; font-size:15px; font-weight:700; color:var(--ink);
  text-align:center; width:calc(100% - 32px); max-width:400px;
  align-self:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

#svg-container {
  width:100%; max-width:380px; align-self:center;
  margin:10px auto 0;
  position:relative;
}
#fold-svg {
  width:100%; height:auto;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,0.18));
  transition:transform .12s;
}
#fold-svg.folding {
  animation:foldAnim 0.45s ease-in-out;
}
@keyframes foldAnim {
  0%   { transform:scaleY(1) rotateX(0deg); }
  40%  { transform:scaleY(0.15) rotateX(60deg); }
  100% { transform:scaleY(1) rotateX(0deg); }
}

/* Tap point circles - rendered inside SVG */
.tap-circle { cursor:pointer; }
.tap-circle circle.ring {
  animation:tapPulse 1.2s ease-in-out infinite;
}
@keyframes tapPulse {
  0%,100% { r:22; opacity:0.7; }
  50% { r:27; opacity:0.4; }
}
.tap-circle.done circle.ring { animation:none; }
.tap-circle.dimmed { opacity:0.35; pointer-events:none; }

.fold-footer {
  width:100%; max-width:400px; align-self:center;
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px;
  margin-top:auto;
}
.undo-btn {
  background:rgba(255,255,255,0.85); border:none; border-radius:50px;
  padding:12px 20px; font-size:16px; font-weight:700;
  cursor:pointer; font-family:inherit; color:var(--ink);
  box-shadow:0 3px 10px rgba(0,0,0,0.10);
}
.undo-btn:disabled { opacity:0.35; cursor:default; }
.hint-text { font-size:12px; color:#5a7a6a; font-weight:700; text-align:right; }

/* ════════════════════════════════
   COMPLETE SCREEN
════════════════════════════════ */
#screen-complete {
  justify-content:center; align-items:center;
  padding:20px;
  background:radial-gradient(ellipse at center, #fff9d0 0%, #ffe0f0 50%, #d0f0ff 100%);
}
.complete-inner { display:flex; flex-direction:column; align-items:center; gap:16px; }
.complete-title { font-size:32px; font-weight:900; color:var(--ink); text-shadow:0 3px 0 rgba(255,255,255,0.9); }
.complete-msg { font-size:16px; font-weight:700; color:#5a6a8a; text-align:center; }
#complete-svg-wrap {
  width:260px; height:260px;
  filter:drop-shadow(0 10px 30px rgba(0,0,0,0.2));
  animation:completePop .6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes completePop {
  from { transform:scale(0.3) rotate(-15deg); opacity:0; }
  to   { transform:scale(1) rotate(0deg); opacity:1; }
}
.confetti {
  position:fixed; pointer-events:none;
  font-size:28px; animation:confettiFall 2.5s ease-in forwards;
}
@keyframes confettiFall {
  0%   { transform:translateY(-40px) rotate(0deg); opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}
.btn-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
</style>
</head>
<body>

<!-- ══ SELECT SCREEN ══ -->
<div id="screen-select" class="screen">
  <h1>🦢 おりがみ</h1>
  <p class="subtitle">なにを つくる？</p>
  <div class="item-grid">
    <div class="item-card" onclick="selectItem('dog')">
      <div class="emoji">🐶</div>
      <div class="label">いぬ</div>
    </div>
    <div class="item-card" onclick="selectItem('airplane')">
      <div class="emoji">✈️</div>
      <div class="label">ひこうき</div>
    </div>
    <div class="item-card" onclick="selectItem('tulip')">
      <div class="emoji">🌷</div>
      <div class="label">チューリップ</div>
    </div>
  </div>
</div>

<!-- ══ COLOR SCREEN ══ -->
<div id="screen-color" class="screen hidden">
  <button class="back-btn" onclick="showScreen('select')">← もどる</button>
  <h2>いろを えらんでね 🎨</h2>
  <p class="subtitle">おりがみの いろ</p>
  <div class="preview-paper" id="color-preview">📄</div>
  <div class="color-grid" id="color-grid"></div>
  <button class="big-btn" onclick="startFolding()">あそぶ！</button>
</div>

<!-- ══ FOLD SCREEN ══ -->
<div id="screen-fold" class="screen hidden">
  <div class="fold-header">
    <button class="back-btn" style="position:static" onclick="showScreen('color')">← やりなおす</button>
    <div class="fold-title" id="fold-item-title">いぬ</div>
    <div class="step-dots" id="step-dots"></div>
  </div>
  <div class="fold-instruction" id="fold-instruction">てほどき</div>
  <div id="svg-container">
    <svg id="fold-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="fold-footer">
    <button class="undo-btn" id="undo-btn" onclick="undoStep()">↩ もどる</button>
    <div class="hint-text" id="hint-text">① を タップしてね</div>
  </div>
</div>

<!-- ══ COMPLETE SCREEN ══ -->
<div id="screen-complete" class="screen hidden">
  <div class="complete-inner">
    <div class="complete-title">🎉 やったね！</div>
    <div id="complete-svg-wrap">
      <svg id="complete-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" width="260" height="260"></svg>
    </div>
    <div class="complete-msg" id="complete-msg">かんせい！</div>
    <div class="btn-row">
      <button class="big-btn green" onclick="restartSameItem()">もういちど</button>
      <button class="big-btn blue" onclick="showScreen('select')">ほかのをつくる</button>
    </div>
  </div>
</div>

<script>
/* ════════════════════════════════
   DATA
════════════════════════════════ */
const COLORS = [
  { hex:'#FF6B6B', name:'あか' },
  { hex:'#FF9F43', name:'オレンジ' },
  { hex:'#FEE040', name:'きいろ' },
  { hex:'#6BCB77', name:'みどり' },
  { hex:'#4D96FF', name:'あお' },
  { hex:'#C77DFF', name:'むらさき' },
  { hex:'#FF80C8', name:'ピンク' },
  { hex:'#FFFFFF', name:'しろ' },
];

/* Helper: darken a hex color */
function darken(hex, factor=0.7) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*factor)},${Math.round(g*factor)},${Math.round(b*factor)})`;
}

/* ════════════════════════════════
   ORIGAMI DEFINITIONS
   Each step = { instruction, svgFn(color), tapPoints:[{x,y}] }
   svgFn returns SVG inner markup (paper shapes, NO tap circles)
   Last element has tapPoints=[] → completion
════════════════════════════════ */

const ORIGAMI = {

  /* ─── DOG FACE ─── */
  dog: {
    name: 'いぬ',
    emoji: '🐶',
    completeMsg: 'わんちゃんの かおが できたよ！',
    steps: [
      {
        instruction: '① と ② を じゅんばんに タップしてね',
        tapPoints: [{x:15,y:150},{x:285,y:150}],
        svgFn: (C) => {
          const D = darken(C);
          return `
            <defs><filter id="ps"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/></filter></defs>
            <polygon points="150,15 285,150 150,285 15,150" fill="${C}" stroke="#4a3728" stroke-width="3" stroke-linejoin="round" filter="url(#ps)"/>
            <polygon points="150,15 285,150 150,285 15,150" fill="url(#grain)" opacity="0.07"/>
            <line x1="150" y1="15" x2="285" y2="150" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
            <line x1="285" y1="150" x2="150" y2="285" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
          `;
        }
      },
      {
        instruction: '① と ② を じゅんばんに タップしてね',
        tapPoints: [{x:15,y:150},{x:90,y:150}],
        svgFn: (C) => {
          const D = darken(C);
          return `
            <defs><filter id="ps"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/></filter></defs>
            <!-- Back triangle (other side of paper) -->
            <polygon points="15,150 285,150 150,285" fill="${darken(C,0.85)}" stroke="#4a3728" stroke-width="2" stroke-linejoin="round" filter="url(#ps)"/>
            <!-- Front folded layer -->
            <polygon points="15,150 285,150 150,15" fill="${C}" stroke="#4a3728" stroke-width="3" stroke-linejoin="round"/>
            <!-- Fold crease -->
            <line x1="15" y1="150" x2="285" y2="150" stroke="${D}" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
            <!-- Highlight -->
            <line x1="85" y1="82" x2="215" y2="82" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
          `;
        }
      },
      {
        instruction: '① と ② を じゅんばんに タップしてね',
        tapPoints: [{x:285,y:150},{x:210,y:150}],
        svgFn: (C) => {
          const D = darken(C);
          return `
            <defs><filter id="ps"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/></filter></defs>
            <!-- Back triangle -->
            <polygon points="15,150 285,150 150,285" fill="${darken(C,0.85)}" stroke="#4a3728" stroke-width="2"/>
            <!-- Main triangle (without left portion) -->
            <polygon points="90,150 285,150 150,15" fill="${C}" stroke="#4a3728" stroke-width="3" filter="url(#ps)"/>
            <!-- Left ear flap -->
            <polygon points="15,150 90,150 52,207" fill="${darken(C,0.78)}" stroke="#4a3728" stroke-width="2"/>
            <!-- Fold crease -->
            <line x1="15" y1="150" x2="285" y2="150" stroke="${D}" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
            <line x1="90" y1="150" x2="52" y2="207" stroke="${D}" stroke-width="1" stroke-dasharray="4,2" opacity="0.4"/>
          `;
        }
      },
      {
        instruction: '① と ② を じゅんばんに タップしてね',
        tapPoints: [{x:135,y:270},{x:165,y:270}],
        svgFn: (C) => {
          const D = darken(C);
          return `
            <defs><filter id="ps"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/></filter></defs>
            <!-- Back -->
            <polygon points="15,150 285,150 150,285" fill="${darken(C,0.85)}" stroke="#4a3728" stroke-width="2"/>
            <!-- Main center triangle -->
            <polygon points="90,150 210,150 150,15" fill="${C}" stroke="#4a3728" stroke-width="3" filter="url(#ps)"/>
            <!-- Left ear -->
            <polygon points="15,150 90,150 52,207" fill="${darken(C,0.78)}" stroke="#4a3728" stroke-width="2"/>
            <!-- Right ear -->
            <polygon points="285,150 210,150 248,207" fill="${darken(C,0.78)}" stroke="#4a3728" stroke-width="2"/>
            <!-- Face area hint -->
            <line x1="90" y1="150" x2="210" y2="150" stroke="${D}" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
          `;
        }
      },
      /* COMPLETE */
      {
        instruction: '',
        tapPoints: [],
        svgFn: (C) => {
          const D = darken(C);
          return `
            <defs><filter id="ps"><feDropShadow dx="2" dy="5" stdDeviation="6" flood-opacity="0.18"/></filter></defs>
            <!-- Back -->
            <polygon points="15,150 285,150 150,285" fill="${darken(C,0.85)}" stroke="#4a3728" stroke-width="2"/>
            <!-- Main face (with snout) -->
            <polygon points="90,150 210,150 218,228 150,252 82,228" fill="${C}" stroke="#4a3728" stroke-width="3" filter="url(#ps)"/>
            <!-- Left ear -->
            <polygon points="15,150 90,150 52,207" fill="${darken(C,0.78)}" stroke="#4a3728" stroke-width="2"/>
            <!-- Right ear -->
            <polygon points="285,150 210,150 248,207" fill="${darken(C,0.78)}" stroke="#4a3728" stroke-width="2"/>
            <!-- Snout fold crease -->
            <line x1="82" y1="228" x2="218" y2="228" stroke="${D}" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
            <!-- Eyes (whites) -->
            <circle cx="122" cy="188" r="14" fill="white" stroke="#3a2a1a" stroke-width="2"/>
            <circle cx="178" cy="188" r="14" fill="white" stroke="#3a2a1a" stroke-width="2"/>
            <!-- Pupils -->
            <circle cx="124" cy="190" r="7" fill="#1a0800"/>
            <circle cx="180" cy="190" r="7" fill="#1a0800"/>
            <!-- Eye shine -->
            <circle cx="127" cy="187" r="2.5" fill="white"/>
            <circle cx="183" cy="187" r="2.5" fill="white"/>
            <!-- Nose -->
            <ellipse cx="150" cy="214" rx="11" ry="8" fill="#1a0800"/>
            <ellipse cx="148" cy="212" rx="4" ry="3" fill="#444" opacity="0.5"/>
            <!-- Mouth -->
            <path d="M 138,224 Q 150,234 162,224" fill="none" stroke="#3a2a1a" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Whiskers -->
            <line x1="95" y1="220" x2="130" y2="218" stroke="#3a2a1a" stroke-width="1.5" opacity="0.6"/>
            <line x1="90" y1="228" x2="128" y2="224" stroke="#3a2a1a" stroke-width="1.5" opacity="0.6"/>
            <line x1="170" y1="218" x2="205" y2="220" stroke="#3a2a1a" stroke-width="1.5" opacity="0.6"/>
            <line x1="172" y1="224" x2="210" y2="228" stroke="#3a2a1a" stroke-width="1.5" opacity="0.6"/>
          `;
        }
      }
    ]
  },

  /* ─── PAPER AIRPLANE ─── */
  airplane: {
    name: 'ひこうき',
    emoji: '✈️',
    completeMsg: 'ひこうきが できたよ！ とばしてみよう！',
    steps: [
      {
        instruction: '① と ② を じゅんばんに タップしてね',
        tapPoints: [{x:30,y:100},{x:270,y:100}],
        svgFn: (C) => {
          const D = darken(C);
          return `
            <defs><filter id="ps"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/></filter></defs>
            <!-- Paper rectangle (landscape) -->
            <rect x="30" y="100" width="240" height="140" rx="4" fill="${C}" stroke="#4a3728" stroke-width="3" filter="url(#ps)"/>
            <!-- Paper lines (texture) -->
            <line x1="150" y1="100" x2="150" y2="240" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="6,4"/>
            <!-- Highlight -->
            <line x1="35" y1="115" x2="265" y2="115" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
          `;
        }
      },
      {
        instruction: '① と ② を じゅんばんに タップしてね',
        tapPoints: [{x:30,y:170},{x:150,y:240}],
        svgFn: (C) => {
          const D = darken(C);
          return `
            <defs><filter id="ps"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/></filter></defs>
            <!-- Half-folded rectangle -->
            <rect x="30" y="170" width="240" height="70" rx="2" fill="${darken(C,0.85)}" stroke="#4a3728" stroke-width="2"/>
            <!-- Top folded layer -->
            <rect x="30" y="170" width="240" height="70" rx="2" fill="${C}" stroke="#4a3728" stroke-width="3" filter="url(#ps)"/>
            <!-- Fold crease -->
            <line x1="30" y1="170" x2="270" y2="170" stroke="${D}" stroke-width="2" stroke-dasharray="6,3" opacity="0.6"/>
            <!-- Center line hint -->
            <line x1="150" y1="170" x2="150" y2="240" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-dasharray="5,3"/>
          `;
        }
      },
      {
        instruction: '① と ② を じゅんばんに タップしてね',
        tapPoints: [{x:270,y:170},{x:150,y:240}],
        svgFn: (C) => {
          const D = darken(C);
          return `
            <defs><filter id="ps"><feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.15"/></filter></defs>
            <!-- Base layer -->
            <rect x="30" y="170" width="240" height="70" rx="2" fill="${darken(C,0.85)}" stroke="#4a3728" stroke-width="2"/>
            <!-- Main right portion -->
            <polygon points="150,170 270,170 270,240 150,240" fill="${C}" stroke="#4a3728" stroke-width="2.5"/>
            <!-- Left wing fold (triangle) -->
            <polygon points="30,170 150,170 30,240" fill="${darken(C,0.8)}" stroke="#4a3728" stroke-width="2"/>
            <!-- Fold creases -->
            <line x1="30" y1="170" x2="270" y2="170" stroke="${D}" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
            <line x1="30" y1="170" x2="150" y2="240" stroke="${D}" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>
          `;
        }
      },
      {
        instruction: '① と ② を じゅんばんに タップしてね',
        tapPoints: [{x:150,y:185},{x:150,y:225}],
        svgFn: (C) => {
          const D = darken(C);

/* ════════════════════════════════
   STATE
════════════════════════════════ */
let currentItem = null;
let selectedColor = '#FF80C8';
let currentStep = 0;
let tapPhase = 0; // 0=waiting first tap, 1=waiting second tap
let stepHistory = [];

/* ════════════════════════════════
   SCREEN MANAGEMENT
════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('screen-' + id).classList.remove('hidden');
}

/* ════════════════════════════════
   SELECT ITEM
════════════════════════════════ */
function selectItem(itemId) {
  currentItem = itemId;
  buildColorGrid();
  showScreen('color');
}

/* ════════════════════════════════
   COLOR SELECTION
════════════════════════════════ */
function buildColorGrid() {
  const grid = document.getElementById('color-grid');
  grid.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c.hex === selectedColor ? ' selected' : '');
    sw.style.background = c.hex;
    if (c.hex === '#FFFFFF') sw.style.border = '4px solid #ccc';
    sw.onclick = () => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      selectedColor = c.hex;
      updatePreview();
    };
    grid.appendChild(sw);
  });
  updatePreview();
}

function updatePreview() {
  const p = document.getElementById('color-preview');
  p.style.background = selectedColor;
  if (selectedColor === '#FFFFFF') p.style.border = '3px solid #ddd';
  else p.style.border = 'none';
}

/* ════════════════════════════════
   START FOLDING
════════════════════════════════ */
function startFolding() {
  currentStep = 0;
  tapPhase = 0;
  stepHistory = [];
  const data = ORIGAMI[currentItem];
  document.getElementById('fold-item-title').textContent = data.emoji + ' ' + data.name;
  buildStepDots();
  renderStep();
  showScreen('fold');
}

function buildStepDots() {
  const data = ORIGAMI[currentItem];
  const foldSteps = data.steps.filter(s => s.tapPoints.length > 0);
  const container = document.getElementById('step-dots');
  container.innerHTML = '';
  foldSteps.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'step-dot';
    dot.id = 'dot-' + i;
    container.appendChild(dot);
  });
  updateDots();
}

function updateDots() {
  const data = ORIGAMI[currentItem];
  const foldSteps = data.steps.filter(s => s.tapPoints.length > 0);
  foldSteps.forEach((_, i) => {
    const dot = document.getElementById('dot-' + i);
    if (!dot) return;
    dot.className = 'step-dot';
    if (i < currentStep) dot.classList.add('done');
    else if (i === currentStep) dot.classList.add('active');
  });
}

/* ════════════════════════════════
   RENDER STEP
════════════════════════════════ */
function renderStep() {
  const data = ORIGAMI[currentItem];
  const step = data.steps[currentStep];
  const svg = document.getElementById('fold-svg');
  const instruction = document.getElementById('fold-instruction');
  const hint = document.getElementById('hint-text');
  const undoBtn = document.getElementById('undo-btn');

  instruction.textContent = step.instruction;
  undoBtn.disabled = (currentStep === 0 && stepHistory.length === 0);

  // Build SVG content
  let content = step.svgFn(selectedColor);

  // Add tap points if this step needs them
  if (step.tapPoints.length === 2) {
    const tp = step.tapPoints;
    content += buildTapPoint(0, tp[0].x, tp[0].y, tapPhase);
    content += buildTapPoint(1, tp[1].x, tp[1].y, tapPhase);
    hint.textContent = tapPhase === 0 ? '① を タップしてね' : '② を タップしてね';
  } else {
    hint.textContent = '';
  }

  svg.innerHTML = content;

  // Attach tap handlers to circles
  if (step.tapPoints.length === 2) {
    const c0 = svg.querySelector('#tap0');
    const c1 = svg.querySelector('#tap1');
    if (c0) c0.addEventListener('click', () => handleTap(0));
    if (c0) c0.addEventListener('touchend', (e) => { e.preventDefault(); handleTap(0); });
    if (c1) c1.addEventListener('click', () => handleTap(1));
    if (c1) c1.addEventListener('touchend', (e) => { e.preventDefault(); handleTap(1); });
  }

  updateDots();
}

function buildTapPoint(idx, x, y, phase) {
  const active = (idx === 0 && phase === 0) || (idx === 1 && phase === 1);
  const done = (idx === 0 && phase === 1);
  const dimmed = (idx === 1 && phase === 0);
  const colors = ['#FFD700', '#FF6B6B'];
  const labels = ['①', '②'];
  const color = colors[idx];
  const opacity = dimmed ? 0.35 : 1;
  const pEvents = dimmed ? 'none' : 'all';

  return `
    <g id="tap${idx}" style="cursor:pointer;opacity:${opacity};pointer-events:${pEvents}">
      ${active ? `<circle cx="${x}" cy="${y}" r="28" fill="${color}" opacity="0.25">
        <animate attributeName="r" values="22;30;22" dur="1.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.1;0.3" dur="1.2s" repeatCount="indefinite"/>
      </circle>` : ''}
      <circle cx="${x}" cy="${y}" r="22" fill="${done ? '#4caf50' : color}" opacity="${active ? 0.9 : 0.7}" stroke="white" stroke-width="3"/>
      <text x="${x}" y="${y+7}" text-anchor="middle" font-size="18" font-weight="900" fill="white" font-family="sans-serif">${done ? '✓' : labels[idx]}</text>
    </g>
  `;
}

/* ════════════════════════════════
   TAP HANDLING
════════════════════════════════ */
function handleTap(idx) {
  const data = ORIGAMI[currentItem];
  const step = data.steps[currentStep];
  if (step.tapPoints.length === 0) return;

  if (idx === 0 && tapPhase === 0) {
    // First tap
    playTapSound(false);
    tapPhase = 1;
    renderStep();
  } else if (idx === 1 && tapPhase === 1) {
    // Second tap - fold!
    playTapSound(true);
    doFold();
  }
}

function doFold() {
  const svg = document.getElementById('fold-svg');
  svg.classList.add('folding');

  setTimeout(() => {
    svg.classList.remove('folding');
    stepHistory.push(currentStep);
    currentStep++;
    tapPhase = 0;

    const data = ORIGAMI[currentItem];
    if (currentStep >= data.steps.length) {
      // Should not happen - last step is complete
      currentStep = data.steps.length - 1;
    }

    // Check if next step is the complete step
    const nextStep = data.steps[currentStep];
    if (nextStep.tapPoints.length === 0) {
      // Complete!
      renderStep();
      setTimeout(showComplete, 300);
    } else {
      renderStep();
    }
  }, 230);
}

/* ════════════════════════════════
   UNDO
════════════════════════════════ */
function undoStep() {
  if (stepHistory.length === 0) return;
  currentStep = stepHistory.pop();
  tapPhase = 0;
  renderStep();
}

/* ════════════════════════════════
   COMPLETION
════════════════════════════════ */
function showComplete() {
  const data = ORIGAMI[currentItem];
  const lastStep = data.steps[data.steps.length - 1];

  // Render complete SVG
  const completeSvg = document.getElementById('complete-svg');
  completeSvg.innerHTML = lastStep.svgFn(selectedColor);

  document.getElementById('complete-msg').textContent = data.completeMsg;

  showScreen('complete');
  spawnConfetti();
  playCompleteSound();
}

function restartSameItem() {
  startFolding();
}

/* ════════════════════════════════
   CONFETTI
════════════════════════════════ */
function spawnConfetti() {
  const emojis = ['🎉','⭐','🌟','🎊','✨','🎈','🌸','💫'];
  for (let i = 0; i < 16; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-40px';
      el.style.animationDuration = (1.8 + Math.random() * 1.5) + 's';
      el.style.fontSize = (20 + Math.random() * 20) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i * 120);
  }
}

/* ════════════════════════════════
   SOUND (Web Audio API)
════════════════════════════════ */
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTapSound(isSecond) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = isSecond ? 880 : 660;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    osc.start(); osc.stop(ctx.currentTime + 0.18);
  } catch(e) {}
}

function playCompleteSound() {
  try {
    const ctx = getAudio();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      setTimeout(() => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(); osc.stop(ctx.currentTime + 0.4);
      }, i * 150);
    });
  } catch(e) {}
}

/* ════════════════════════════════
   INIT
════════════════════════════════ */
buildColorGrid();
