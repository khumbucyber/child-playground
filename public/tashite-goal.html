<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>たして ゴール！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: linear-gradient(150deg, #fff5c8 0%, #ffd4ec 50%, #d4e8ff 100%);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', 'Kosugi Maru', sans-serif;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}

/* ─ Header ─ */
.header {
  flex-shrink: 0;
  width: 100%;
  padding: 10px 16px 6px;
  text-align: center;
  position: relative;
}

.back-btn {
  position: absolute;
  top: 10px;
  left: 12px;
  text-decoration: none;
  font-size: 13px;
  font-weight: 900;
  color: #7a5a9a;
  background: rgba(255,255,255,0.75);
  border-radius: 999px;
  padding: 5px 11px;
  touch-action: manipulation;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  box-shadow: 0 2px 6px rgba(80,40,140,0.15);
}

.title {
  font-size: 20px;
  font-weight: 900;
  color: #5a30a0;
  text-shadow: 0 2px 0 rgba(255,255,255,0.8);
  letter-spacing: 1px;
}

.sub {
  font-size: 11px;
  color: #7a5a9a;
  font-weight: bold;
  margin-top: 2px;
}

/* ─ Level badge ─ */
.level-bar {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
}

.level-badge {
  font-size: 12px;
  font-weight: 900;
  padding: 4px 14px;
  border-radius: 999px;
  border: 2px solid transparent;
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.15s;
}
.level-badge:active { transform: scale(0.93); }
.level-badge.lv1 { background: #c8f0b8; color: #2a7a3a; border-color: #a0d890; }
.level-badge.lv2 { background: #ffe0a0; color: #8a5000; border-color: #ffc060; }
.level-badge.lv3 { background: #ffc0c0; color: #8a2020; border-color: #ff9090; }
.level-badge.lv4 { background: #d0c0ff; color: #3a2080; border-color: #b090ff; }
.level-badge.active-lv { transform: scale(1.12); box-shadow: 0 3px 10px rgba(0,0,0,0.18); }

/* ─ Score / Progress ─ */
.score-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-top: 10px;
  font-size: 13px;
  font-weight: 900;
  color: #5a30a0;
}

.score-box {
  background: rgba(255,255,255,0.7);
  border-radius: 12px;
  padding: 4px 14px;
  box-shadow: 0 2px 8px rgba(80,40,140,0.12);
}

/* ─ Goal display ─ */
.goal-wrap {
  margin-top: 16px;
  text-align: center;
}

.goal-label {
  font-size: 13px;
  font-weight: 900;
  color: #7a5a9a;
  margin-bottom: 4px;
}

.goal-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 88px;
  height: 88px;
  border-radius: 24px;
  background: linear-gradient(135deg, #ff6090, #ff9f43);
  color: white;
  font-size: 52px;
  font-weight: 900;
  box-shadow: 0 8px 24px rgba(240,80,100,0.4), 0 0 0 4px rgba(255,255,255,0.6);
  text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
}
.goal-number.pulse {
  animation: goalPulse 0.4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes goalPulse {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.18); }
  100% { transform: scale(1); }
}

/* ─ Current sum display ─ */
.sum-wrap {
  margin-top: 10px;
  text-align: center;
}

.sum-label {
  font-size: 12px;
  font-weight: 900;
  color: #7a5a9a;
  margin-bottom: 3px;
}

.sum-display {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.8);
  border-radius: 16px;
  padding: 6px 18px;
  font-size: 22px;
  font-weight: 900;
  color: #5a30a0;
  box-shadow: 0 2px 10px rgba(80,40,140,0.15);
  min-width: 100px;
  justify-content: center;
  min-height: 44px;
}

.sum-expr {
  font-size: 15px;
  color: #9a7aba;
}

/* ─ Number grid ─ */
.grid-wrap {
  margin-top: 14px;
  padding: 0 16px;
  width: 100%;
  max-width: 400px;
}

.num-grid {
  display: grid;
  gap: 10px;
}
.num-grid.cols3 { grid-template-columns: repeat(3, 1fr); }
.num-grid.cols4 { grid-template-columns: repeat(4, 1fr); }

.num-btn {
  aspect-ratio: 1;
  border-radius: 18px;
  border: none;
  font-size: 30px;
  font-weight: 900;
  color: #3a2060;
  background: white;
  box-shadow: 0 5px 0 rgba(80,50,140,0.22);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.12s, box-shadow 0.12s, background 0.15s;
  touch-action: manipulation;
  position: relative;
}
.num-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(80,50,140,0.18); }

.num-btn.selected {
  background: linear-gradient(135deg, #c0e8ff, #a0c8ff);
  box-shadow: 0 5px 0 rgba(40,80,180,0.3), inset 0 0 0 3px rgba(100,160,255,0.5);
  color: #1a4080;
  transform: translateY(-2px);
}

.num-btn.over {
  background: linear-gradient(135deg, #ffc0c0, #ff9090);
  color: #8a1010;
}

.num-btn.used {
  opacity: 0.3;
  pointer-events: none;
}

.num-btn .check-mark {
  position: absolute;
  top: 4px; right: 6px;
  font-size: 14px;
}

/* ─ Action buttons ─ */
.action-row {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  justify-content: center;
  padding: 0 16px;
  width: 100%;
  max-width: 400px;
}

.action-btn {
  flex: 1;
  height: 52px;
  border: none;
  border-radius: 999px;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
  touch-action: manipulation;
  box-shadow: 0 5px 0 rgba(0,0,0,0.15);
  transition: transform 0.1s, box-shadow 0.1s;
  letter-spacing: 0.5px;
}
.action-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.12); }

.btn-reset {
  background: linear-gradient(135deg, #e0d0ff, #c8b0ff);
  color: #4a1090;
}
.btn-check {
  background: linear-gradient(135deg, #43c664, #4d96ff);
  color: white;
  flex: 1.6;
}
.btn-check:disabled {
  background: linear-gradient(135deg, #ccc, #aaa);
  cursor: default;
  box-shadow: 0 2px 0 rgba(0,0,0,0.1);
}

/* ─ Overlay ─ */
.overlay {
  position: fixed; inset: 0;
  background: rgba(60,30,100,0.6);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.overlay.show { opacity: 1; pointer-events: all; }

.pcard {
  background: white;
  border-radius: 28px;
  padding: 30px 28px 24px;
  text-align: center;
  max-width: 300px;
  width: 86vw;
  box-shadow: 0 24px 60px rgba(80,40,140,0.4);
  transform: scale(0.7) translateY(40px);
  transition: transform 0.45s cubic-bezier(.34,1.56,.64,1);
}
.overlay.show .pcard { transform: scale(1) translateY(0); }

.pemoji { font-size: 72px; display: block; margin-bottom: 8px; line-height: 1; }
.ptitle { font-size: 22px; font-weight: 900; color: #5a30a0; margin-bottom: 8px; }
.ptext  { font-size: 13px; color: #666; line-height: 1.9; margin-bottom: 20px; white-space: pre-line; }

.pbtn {
  background: linear-gradient(135deg, #43c664, #4d96ff);
  color: white;
  border: none;
  border-radius: 999px;
  padding: 14px 28px;
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(67,198,100,0.45);
  width: 100%;
  letter-spacing: 1px;
  touch-action: manipulation;
}

/* ─ Confetti ─ */
#cfCanvas {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 50;
  width: 100%; height: 100%;
}

/* ─ Miss shake ─ */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-8px); }
  40%      { transform: translateX(8px); }
  60%      { transform: translateX(-6px); }
  80%      { transform: translateX(6px); }
}
.shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<div class="header">
  <a href="./index.html" class="back-btn">&#8592; もどる</a>
  <div class="title">🔢 たして ゴール！</div>
  <div class="sub">すうじを えらんで ゴールの かずに しよう！</div>
  <div class="level-bar">
    <button class="level-badge lv1" data-lv="1" onclick="setLevel(1)">Lv1 たしざん</button>
    <button class="level-badge lv2" data-lv="2" onclick="setLevel(2)">Lv2 くりあがり</button>
    <button class="level-badge lv3" data-lv="3" onclick="setLevel(3)">Lv3 ひきざん</button>
    <button class="level-badge lv4" data-lv="4" onclick="setLevel(4)">Lv4 かけざん</button>
  </div>
</div>

<div class="score-row">
  <div class="score-box">⭐ <span id="scoreVal">0</span> てん</div>
  <div class="score-box">🎯 <span id="qNum">1</span> もんめ</div>
</div>

<div class="goal-wrap">
  <div class="goal-label">ゴールの かず</div>
  <div class="goal-number" id="goalNum">?</div>
</div>

<div class="sum-wrap">
  <div class="sum-label">えらんだ かず</div>
  <div class="sum-display" id="sumDisplay">—</div>
</div>

<div class="grid-wrap">
  <div class="num-grid cols3" id="numGrid"></div>
</div>

<div class="action-row">
  <button class="action-btn btn-reset" onclick="resetSelection()">やりなおし</button>
  <button class="action-btn btn-check" id="checkBtn" onclick="checkAnswer()" disabled>こたえる！</button>
</div>

<div class="overlay" id="overlay">
  <div class="pcard">
    <span class="pemoji" id="pEmoji"></span>
    <div class="ptitle" id="pTitle"></div>
    <div class="ptext"  id="pText"></div>
    <button class="pbtn" id="pBtn" onclick="nextQuestion()"></button>
  </div>
</div>

<canvas id="cfCanvas"></canvas>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────
let currentLevel = 1;
let goal = 0;
let numbers = [];      // displayed numbers
let selected = [];     // indices of selected numbers
let score = 0;
let qNum = 1;
let confettiParticles = [];
let cfRaf = null;

// ── Level config ───────────────────────────────────────────
const LEVEL = {
  1: { label: 'Lv1 たしざん',   cols: 3, count: 6, gen: genLv1 },
  2: { label: 'Lv2 くりあがり', cols: 3, count: 6, gen: genLv2 },
  3: { label: 'Lv3 ひきざん',   cols: 4, count: 8, gen: genLv3 },
  4: { label: 'Lv4 かけざん',   cols: 4, count: 8, gen: genLv4 },
};

function rnd(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Lv1: 10以内の足し算、2つ選ぶ
function genLv1() {
  const a = rnd(1, 8);
  const b = rnd(1, 10 - a);
  const goal = a + b;
  const extras = [];
  while (extras.length < 4) {
    const n = rnd(1, 9);
    if (n !== a && n !== b && !extras.includes(n)) extras.push(n);
  }
  return { goal, answers: [a, b], extras, needCount: 2 };
}

// Lv2: 20以内の足し算（繰り上がり含む）、2〜3つ選ぶ
function genLv2() {
  const mode = rnd(0, 1);
  if (mode === 0) {
    // 2数
    const a = rnd(3, 15);
    const b = rnd(5, 20 - a);
    const goal = a + b;
    const extras = [];
    while (extras.length < 4) {
      const n = rnd(1, 15);
      if (n !== a && n !== b && !extras.includes(n)) extras.push(n);
    }
    return { goal, answers: [a, b], extras, needCount: 2 };
  } else {
    // 3数
    const a = rnd(2, 8);
    const b = rnd(2, 8);
    const c = rnd(2, 8);
    const goal = a + b + c;
    const extras = [];
    while (extras.length < 5) {
      const n = rnd(1, 12);
      if (n !== a && n !== b && n !== c && !extras.includes(n)) extras.push(n);
    }
    return { goal, answers: [a, b, c], extras, needCount: 3 };
  }
}

// Lv3: 引き算混じり（大 - 小 = 答え、マイナスの数を選ぶ表現は使わず、
//      「大きい数から小さい数をひいたら？」という形で出す）
// 実装: answers = [大, 小], goal = 大 - 小, ユーザーは 大と小を選ぶ
// → 足し算に見せるため「ゴール + 小 = 大」として numbers に含め、
//   ゴール表示は 大 - 小 の結果。選ぶのは引かれる数と引く数の2つ。
// シンプルに: goal = a, 数字リストに a+b と b を含め「大きい数から小さい数をひくといくつ？」
function genLv3() {
  const b = rnd(1, 9);    // 引く数
  const a = rnd(b+1, b+12); // 引かれる数
  const goal = a - b;
  const extras = [];
  while (extras.length < 6) {
    const n = rnd(1, 20);
    if (n !== a && n !== b && !extras.includes(n)) extras.push(n);
  }
  return { goal, answers: [a, b], extras, needCount: 2, isSubtract: true };
}

// Lv4: 九九（2〜9の段から1問）
function genLv4() {
  const a = rnd(2, 9);
  const b = rnd(2, 9);
  const goal = a * b;
  const extras = [];
  while (extras.length < 6) {
    const n = rnd(2, 9);
    if (n !== a && n !== b && !extras.includes(n)) extras.push(n);
  }
  return { goal, answers: [a, b], extras, needCount: 2, isMultiply: true };
}

// ── Generate question ──────────────────────────────────────
let currentQ = null;

function newQuestion() {
  selected = [];
  const cfg = LEVEL[currentLevel];
  const q = cfg.gen();
  currentQ = q;
  goal = q.goal;

  // Build number pool
  numbers = shuffle([...q.answers, ...q.extras]).slice(0, cfg.count);
  // Ensure answers are included
  for (const ans of q.answers) {
    if (!numbers.includes(ans)) {
      numbers[rnd(0, numbers.length - 1)] = ans;
    }
  }
  shuffle(numbers);

  renderGoal();
  renderGrid();
  renderSum();
  document.getElementById('checkBtn').disabled = true;
}

function renderGoal() {
  const el = document.getElementById('goalNum');
  el.textContent = goal;
  el.classList.remove('pulse');
  void el.offsetWidth;
  el.classList.add('pulse');

  // hint label
  const label = document.querySelector('.goal-label');
  if (currentQ.isSubtract) {
    label.textContent = 'おおきい かず から ちいさい かず を ひいて このかずに！';
  } else if (currentQ.isMultiply) {
    label.textContent = 'かけると このかずに なる ふたつを えらぼう！';
  } else {
    label.textContent = 'ゴールの かず';
  }
}

function renderGrid() {
  const cfg = LEVEL[currentLevel];
  const grid = document.getElementById('numGrid');
  grid.className = `num-grid cols${cfg.cols === 4 ? '4' : '3'}`;
  grid.innerHTML = '';
  numbers.forEach((n, i) => {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.dataset.index = i;
    btn.textContent = n;
    btn.addEventListener('click', () => toggleNum(i));
    grid.appendChild(btn);
  });
}

function renderSum() {
  const el = document.getElementById('sumDisplay');
  if (selected.length === 0) {
    el.textContent = '—';
    return;
  }
  const vals = selected.map(i => numbers[i]);
  const q = currentQ;
  let expr = '';
  let result = 0;

  if (q.isSubtract && selected.length === 2) {
    const sorted = [...vals].sort((a, b) => b - a);
    result = sorted[0] - sorted[1];
    expr = `${sorted[0]} − ${sorted[1]} = ${result}`;
  } else if (q.isMultiply && selected.length === 2) {
    result = vals[0] * vals[1];
    expr = `${vals[0]} × ${vals[1]} = ${result}`;
  } else {
    result = vals.reduce((a, b) => a + b, 0);
    expr = vals.join(' + ') + ' = ' + result;
  }

  el.textContent = expr;

  // color feedback
  if (result === goal) {
    el.style.color = '#1a7a30';
    el.style.background = 'rgba(180,255,180,0.9)';
  } else if (result > goal) {
    el.style.color = '#8a1010';
    el.style.background = 'rgba(255,200,200,0.9)';
  } else {
    el.style.color = '#5a30a0';
    el.style.background = 'rgba(255,255,255,0.8)';
  }
}

function toggleNum(idx) {
  const q = currentQ;
  const needed = q.needCount;

  if (selected.includes(idx)) {
    selected = selected.filter(i => i !== idx);
  } else {
    if (selected.length >= needed) return;
    selected.push(idx);
  }

  // Update button visuals
  const btns = document.querySelectorAll('.num-btn');
  btns.forEach((btn, i) => {
    btn.classList.toggle('selected', selected.includes(i));
  });

  renderSum();

  const checkBtn = document.getElementById('checkBtn');
  checkBtn.disabled = selected.length !== needed;
}

function resetSelection() {
  selected = [];
  document.querySelectorAll('.num-btn').forEach(btn => {
    btn.classList.remove('selected', 'over');
  });
  renderSum();
  document.getElementById('checkBtn').disabled = true;
}

function checkAnswer() {
  const vals = selected.map(i => numbers[i]);
  const q = currentQ;
  let result;

  if (q.isSubtract) {
    const sorted = [...vals].sort((a, b) => b - a);
    result = sorted[0] - sorted[1];
  } else if (q.isMultiply) {
    result = vals[0] * vals[1];
  } else {
    result = vals.reduce((a, b) => a + b, 0);
  }

  if (result === goal) {
    score += currentLevel * 10;
    document.getElementById('scoreVal').textContent = score;
    showPopup(true);
    startConfetti();
  } else {
    showPopup(false);
    // shake grid
    const grid = document.getElementById('numGrid');
    grid.classList.remove('shake');
    void grid.offsetWidth;
    grid.classList.add('shake');
    grid.addEventListener('animationend', () => grid.classList.remove('shake'), { once: true });
  }
}

// ── Popup ──────────────────────────────────────────────────
function showPopup(correct) {
  const overlay = document.getElementById('overlay');
  const emoji = document.getElementById('pEmoji');
  const title = document.getElementById('pTitle');
  const text  = document.getElementById('pText');
  const btn   = document.getElementById('pBtn');

  if (correct) {
    const emojis = ['🎉', '⭐', '🌟', '🎊', '✨'];
    emoji.textContent = emojis[rnd(0, emojis.length - 1)];
    title.textContent = 'せいかい！！';
    text.textContent  = `+${currentLevel * 10}てん ゲット！\nごうけい ${score}てん`;
    btn.textContent   = 'つぎの もんだい ▶';
  } else {
    emoji.textContent = '😢';
    title.textContent = 'ざんねん…';
    text.textContent  = 'もう いちど やってみよう！';
    btn.textContent   = 'もう いちど';
  }

  overlay.classList.add('show');
}

function nextQuestion() {
  document.getElementById('overlay').classList.remove('show');
  stopConfetti();

  const wasCorrect = document.getElementById('pTitle').textContent === 'せいかい！！';
  if (wasCorrect) {
    qNum++;
    document.getElementById('qNum').textContent = qNum;
  }
  newQuestion();
}

// ── Level switch ───────────────────────────────────────────
function setLevel(lv) {
  currentLevel = lv;
  document.querySelectorAll('.level-badge').forEach(b => {
    b.classList.toggle('active-lv', parseInt(b.dataset.lv) === lv);
  });
  qNum = 1;
  score = 0;
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('qNum').textContent = qNum;
  newQuestion();
}

// ── Confetti ───────────────────────────────────────────────
const cfCanvas = document.getElementById('cfCanvas');
const cfCtx = cfCanvas.getContext('2d');

function resizeCf() {
  cfCanvas.width = window.innerWidth;
  cfCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCf);
resizeCf();

const CF_COLORS = ['#ff6090','#ffd43b','#4d96ff','#43c664','#ff9f43','#cc5de8'];

function startConfetti() {
  confettiParticles = [];
  for (let i = 0; i < 90; i++) {
    confettiParticles.push({
      x: Math.random() * cfCanvas.width,
      y: -10 - Math.random() * 200,
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.2,
      w: 8 + Math.random() * 8,
      h: 4 + Math.random() * 4,
      color: CF_COLORS[Math.floor(Math.random() * CF_COLORS.length)],
      alpha: 1,
    });
  }
  if (cfRaf) cancelAnimationFrame(cfRaf);
  animateCf();
}

function animateCf() {
  cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
  let alive = false;
  confettiParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
    if (p.y > cfCanvas.height) p.alpha -= 0.05;
    if (p.alpha > 0) alive = true;
    cfCtx.save();
    cfCtx.globalAlpha = Math.max(0, p.alpha);
    cfCtx.translate(p.x, p.y);
    cfCtx.rotate(p.rot);
    cfCtx.fillStyle = p.color;
    cfCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    cfCtx.restore();
  });
  if (alive) cfRaf = requestAnimationFrame(animateCf);
  else cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
}

function stopConfetti() {
  if (cfRaf) { cancelAnimationFrame(cfRaf); cfRaf = null; }
  cfCtx.clearRect(0, 0, cfCanvas.width, cfCanvas.height);
  confettiParticles = [];
}

// ── Init ───────────────────────────────────────────────────
setLevel(1);
</script>
